<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>드림포인트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    :root {
      --primary:#2563eb; --secondary:#0ea5e9;
      --success:#16a34a; --danger:#dc2626;
      --bg:#f0f4ff; --card:#fff; --text:#1e293b;
      --muted:#64748b; --border:#e2e8f0;
      --radius:14px; --shadow:0 2px 16px rgba(37,99,235,.07);
      --nav-h:60px; --safe-b:env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;}

    /* ── 로그인 ── */
    #loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1e40af 0%,#0ea5e9 100%);}
    .login-box{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeUp .4s ease;}
    .login-logo{text-align:center;margin-bottom:24px;}
    .login-logo .icon{font-size:2.6rem;display:block;margin-bottom:6px;}
    .login-logo h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--primary);}
    .login-logo p{font-size:.78rem;color:var(--muted);margin-top:3px;}
    .role-tabs{display:flex;gap:5px;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:18px;}
    .role-tab{flex:1;padding:10px 4px;text-align:center;border-radius:9px;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .2s;font-family:inherit;}
    .role-tab.active{background:#fff;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.1);}
    .fg{margin-bottom:13px;}
    .fg label{font-size:.76rem;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;}
    .fg input{width:100%;height:48px;border:1.5px solid var(--border);border-radius:10px;padding:0 14px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s;}
    .fg input:focus{border-color:var(--primary);}
    .btn-primary{width:100%;height:52px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s,transform .1s;}
    .btn-primary:active{transform:scale(.98);}

    /* ── 앱 ── */
    #app{display:none;min-height:100vh;}
    .app-header{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 1px 8px rgba(0,0,0,.05);}
    .app-header .logo{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:var(--primary);}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-badge{background:var(--bg);border-radius:20px;padding:4px 10px;font-size:.72rem;font-weight:700;color:var(--primary);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .btn-logout{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 9px;font-size:.7rem;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap;}

    /* ── 하단 네비 ── */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,.06);padding-bottom:var(--safe-b);}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;font-size:.62rem;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;gap:2px;transition:color .15s;min-height:var(--nav-h);}
    .nav-item .ni{font-size:1.35rem;line-height:1;}
    .nav-item.active{color:var(--primary);}

    /* ── 콘텐츠 ── */
    .main-content{padding:16px 14px calc(var(--nav-h) + var(--safe-b) + 14px);max-width:520px;margin:0 auto;}
    .view{display:none;animation:fadeUp .25s ease;}
    .view.active{display:block;}
    .section-title{font-size:1.05rem;font-weight:900;color:var(--text);margin-bottom:12px;margin-top:2px;}
    .card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
    .card-title{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.4px;text-transform:uppercase;}

    /* ── 통계 ── */
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
    .stat-box{background:var(--card);border-radius:var(--radius);padding:14px 12px;box-shadow:var(--shadow);text-align:center;}
    .stat-box .sl{font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:3px;}
    .stat-box .sv{font-size:1.5rem;font-weight:900;color:var(--primary);}
    .stat-box.g .sv{color:var(--success);}
    .stat-box.r .sv{color:var(--danger);}

    /* ── 학생 검색 ── */
    .search-input{width:100%;height:44px;border:1.5px solid var(--border);border-radius:10px;padding:0 13px;font-size:16px;font-family:inherit;outline:none;margin-bottom:7px;transition:border-color .2s;}
    .search-input:focus{border-color:var(--primary);}
    .student-list{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;background:#fafbff;-webkit-overflow-scrolling:touch;}
    .student-item{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;gap:10px;transition:background .1s;}
    .student-item:last-child{border-bottom:none;}
    .student-item:active{background:#eff6ff;}
    .student-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);flex-shrink:0;}
    .student-item .sid{font-size:.7rem;color:var(--muted);}
    .student-item .sname{font-size:.88rem;font-weight:700;}

    /* ── 상벌점 탭 ── */
    .item-tabs{display:flex;gap:0;margin-bottom:10px;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);}
    .item-tab{flex:1;padding:11px;text-align:center;font-size:.85rem;font-weight:700;cursor:pointer;border:none;background:#f8fafc;color:var(--muted);font-family:inherit;transition:all .15s;}
    .item-tab.active-reward{background:var(--success);color:#fff;}
    .item-tab.active-penalty{background:var(--danger);color:#fff;}

    /* ── 항목 패널 ── */
    .item-panel{display:none;}
    .item-panel.active{display:block;}

    /* ── 아코디언 (담임/일반 그룹) ── */
    .acc-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#f8fafc;border-radius:9px;cursor:pointer;margin-bottom:5px;border:1px solid var(--border);user-select:none;-webkit-user-select:none;}
    .acc-header span{font-size:.78rem;font-weight:700;color:var(--muted);}
    .acc-arrow{font-size:.65rem;color:var(--muted);transition:transform .2s;}
    .acc-header.open .acc-arrow{transform:rotate(180deg);}
    .acc-body{display:none;margin-bottom:6px;}
    .acc-body.open{display:block;}

    /* ── 항목 버튼 ── */
    .item-btn{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;background:#fff;font-family:inherit;font-size:.82rem;color:var(--text);width:100%;text-align:left;transition:all .12s;-webkit-tap-highlight-color:transparent;}
    .item-btn:active{opacity:.8;}
    .item-btn.sel-r{border-color:var(--success);background:#f0fdf4;}
    .item-btn.sel-p{border-color:var(--danger);background:#fff1f2;}
    .item-btn .sb{font-size:.82rem;font-weight:900;min-width:32px;text-align:right;flex-shrink:0;}
    .sb.pos{color:var(--success);}
    .sb.neg{color:var(--danger);}
    .limit-badge{font-size:.6rem;background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 5px;margin-left:5px;font-weight:700;vertical-align:middle;}

    /* ── 요약바 ── */
    .summary-bar{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .summary-bar .st{font-size:.8rem;font-weight:700;color:var(--primary);}
    .summary-bar .ss{font-size:1.05rem;font-weight:900;}

    /* ── 저장 버튼 ── */
    .btn-save{width:100%;height:52px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 3px 12px rgba(37,99,235,.28);transition:opacity .2s,transform .1s;}
    .btn-save:active{transform:scale(.98);}
    .btn-save:disabled{opacity:.55;cursor:not-allowed;}

    /* ── 기록 내역 ── */
    .tab-filter{display:flex;gap:5px;margin-bottom:10px;}
    .tab-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:.74rem;font-weight:700;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .12s;}
    .tab-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
    .record-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:10px;margin-bottom:7px;background:#fafbff;border:1px solid var(--border);}
    .record-item .ri .rn{font-size:.88rem;font-weight:700;}
    .record-item .ri .rm{font-size:.7rem;color:var(--muted);margin-top:2px;}
    .record-item .rr{text-align:right;}
    .rec-score{font-size:.95rem;font-weight:900;}
    .rec-score.pos{color:var(--success);}
    .rec-score.neg{color:var(--danger);}
    .btn-del{font-size:.68rem;padding:3px 8px;border-radius:6px;border:1px solid var(--danger);color:var(--danger);background:none;cursor:pointer;font-family:inherit;margin-top:4px;}

    /* ── 학생 점수 ── */
    .score-hero{background:linear-gradient(135deg,#1e40af,#0ea5e9);border-radius:18px;padding:26px 20px;text-align:center;color:#fff;margin-bottom:12px;}
    .score-hero .hn{font-size:.88rem;opacity:.8;margin-bottom:4px;}
    .score-hero .hs{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;}
    .score-hero .hl{font-size:.75rem;opacity:.65;margin-top:1px;}
    .score-row{display:flex;justify-content:space-between;padding:9px 12px;border-bottom:1px solid #f1f5f9;font-size:.82rem;}
    .score-row:last-child{border-bottom:none;}
    .score-row .rd{color:var(--muted);font-size:.73rem;flex-shrink:0;margin-right:8px;}
    .score-row .rr2{flex:1;}
    .score-row .rs{font-weight:900;flex-shrink:0;margin-left:8px;}

    /* ── 랭킹 ── */
    .rank-item{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid #f1f5f9;gap:10px;}
    .rank-num{width:24px;height:24px;border-radius:50%;background:var(--bg);font-size:.72rem;font-weight:900;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;}
    .rank-num.gold{background:#fef3c7;color:#d97706;}
    .rank-num.silver{background:#f1f5f9;color:#64748b;}
    .rank-num.bronze{background:#fff7ed;color:#c2410c;}
    .rank-name{flex:1;font-size:.86rem;font-weight:700;}
    .rank-score{font-size:.92rem;font-weight:900;color:var(--primary);}

    /* ── 공통 ── */
    .empty-state{text-align:center;padding:28px 16px;color:var(--muted);font-size:.83rem;}
    .empty-state .ei{font-size:2.2rem;display:block;margin-bottom:7px;opacity:.35;}
    .teacher-auth{display:flex;gap:7px;margin-bottom:11px;}
    .teacher-auth input{flex:1;height:42px;border:1.5px solid var(--border);border-radius:10px;padding:0 11px;font-size:15px;font-family:inherit;outline:none;}
    .teacher-auth input:focus{border-color:var(--primary);}
    .loading-spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px;}
    .hidden{display:none!important;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── 토스트 ── */
    #toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 10px);left:50%;transform:translateX(-50%) translateY(14px);background:#1e293b;color:#fff;padding:11px 20px;border-radius:26px;font-size:.82rem;font-weight:700;opacity:0;transition:all .25s;pointer-events:none;white-space:pre-line;text-align:center;max-width:88vw;z-index:999;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<!-- ── 로그인 ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">🏫</span>
      <h1 id="loginTitle">드림포인트</h1>
      <p id="loginSubtitle">학생 상벌점 관리 시스템</p>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('admin')" id="tabAdmin">🔑 관리자</button>
      <button class="role-tab" onclick="setRole('teacher')" id="tabTeacher">👩‍🏫 교사</button>
      <button class="role-tab" onclick="setRole('student')" id="tabStudent">🎒 학생</button>
    </div>
    <div class="fg">
      <label id="loginIdLabel">아이디</label>
      <input type="text" id="loginId" placeholder="아이디 입력" autocomplete="off" autocapitalize="none">
    </div>
    <div class="fg">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" onclick="doLogin()" id="loginBtn">로그인 →</button>
  </div>
</div>

<!-- ── 앱 ── -->
<div id="app">
  <header class="app-header">
    <div class="logo" id="appLogo">드림포인트</div>
    <div class="header-right">
      <div class="user-badge" id="userBadge"></div>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <main class="main-content">

    <!-- 입력 뷰 -->
    <div class="view active" id="viewInput">
      <p class="section-title">✏️ 상벌점 입력</p>

      <div id="teacherAuthArea">
        <div class="card">
          <div class="card-title">교사 인증</div>
          <div class="teacher-auth">
            <input type="text" id="tId" placeholder="교사 ID" autocapitalize="none">
            <input type="password" id="tPw" placeholder="비밀번호">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">학생 선택</div>
        <input class="search-input" type="search" id="searchInput" placeholder="🔍 이름 또는 학번 검색" oninput="filterStudents()">
        <div class="student-list" id="studentList">
          <div class="empty-state"><span class="ei">⏳</span>목록 로딩 중…</div>
        </div>
      </div>

      <!-- 상벌점 항목 탭 -->
      <div class="card">
        <div class="item-tabs">
          <button class="item-tab active-reward" id="tabReward" onclick="switchItemTab('reward')">✅ 상점</button>
          <button class="item-tab" id="tabPenalty" onclick="switchItemTab('penalty')">❌ 벌점</button>
        </div>
        <div class="item-panel active" id="panelReward"></div>
        <div class="item-panel" id="panelPenalty"></div>
      </div>

      <div class="summary-bar">
        <div class="st" id="sumText">학생·항목을 선택하세요</div>
        <div class="ss" id="sumScore" style="color:var(--muted)">0점</div>
      </div>
      <button class="btn-save" id="btnSave" onclick="saveRecord()">💾 기록하기</button>
    </div>

    <!-- 기록 뷰 -->
    <div class="view" id="viewHistory">
      <p class="section-title">📋 내 입력 기록</p>
      <div class="tab-filter">
        <button class="tab-btn active" onclick="filterHistory('all',this)">전체</button>
        <button class="tab-btn" onclick="filterHistory('reward',this)">상점</button>
        <button class="tab-btn" onclick="filterHistory('penalty',this)">벌점</button>
      </div>
      <div id="historyList"><div class="empty-state"><span class="ei">📭</span>기록이 없습니다</div></div>
    </div>

    <!-- 학생 점수 뷰 -->
    <div class="view" id="viewMyScore">
      <p class="section-title">🏆 나의 드림포인트</p>
      <div id="myScoreContent">
        <div class="card">
          <div class="card-title">학번 & 비밀번호로 조회</div>
          <div class="fg"><label>학번</label><input type="text" id="sSid" placeholder="학번 입력" inputmode="numeric"></div>
          <div class="fg"><label>비밀번호</label><input type="password" id="sSpw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')searchStudent()"></div>
          <button class="btn-save" onclick="searchStudent()">조회하기</button>
        </div>
      </div>
    </div>

    <!-- 관리자 대시보드 뷰 -->
    <div class="view" id="viewDash">
      <p class="section-title">📊 전체 현황</p>
      <div class="stat-grid">
        <div class="stat-box"><div class="sl">전체 기록수</div><div class="sv" id="statTotal">-</div></div>
        <div class="stat-box g"><div class="sl">상점 합계</div><div class="sv" id="statReward">-</div></div>
        <div class="stat-box r"><div class="sl">벌점 합계</div><div class="sv" id="statPenalty">-</div></div>
        <div class="stat-box"><div class="sl">참여 학생수</div><div class="sv" id="statStudents">-</div></div>
      </div>
      <div class="card">
        <div class="card-title">🏆 상위 학생 (누적 상점)</div>
        <div id="rankList"><div class="empty-state"><span class="ei">⏳</span>로딩 중…</div></div>
      </div>
      <div class="card">
        <div class="card-title">📅 최근 50건 기록</div>
        <div id="allRecordList"><div class="empty-state"><span class="ei">⏳</span>로딩 중…</div></div>
      </div>
    </div>

  </main>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<div id="toast"></div>

<script>
// ── 전역 상태 ──
let currentRole = 'admin', currentUser = null;
let allStudents = [], selectedItem = null;
let allHistory = [], historyFilter = 'all';
let currentItemTab = 'reward';

// ── 페이지 로드 시 학생 목록 미리 캐싱 (속도 개선) ──
let _studentCache = null;
(function prefetch() {
  callAPI({ action: 'getAllStudents' }, res => {
    if (res.students) _studentCache = res.students;
  });
})();

// ── 테마 적용 ──
(function applyTheme() {
  const t = CONFIG.THEME;
  const r = document.documentElement.style;
  r.setProperty('--primary', t.primary);
  r.setProperty('--secondary', t.secondary);
  r.setProperty('--success', t.success);
  r.setProperty('--danger', t.danger);
  r.setProperty('--bg', t.bg);
  r.setProperty('--card', t.card);
  r.setProperty('--text', t.text);
  r.setProperty('--muted', t.muted);
  document.getElementById('loginTitle').textContent = CONFIG.SYSTEM_NAME;
  document.getElementById('loginSubtitle').textContent = CONFIG.SYSTEM_SUBTITLE;
})();

// ── JSONP API 호출 ──
let _cbIdx = 0;
function callAPI(payload, cb) {
  const cbName = '__dp_cb_' + (++_cbIdx);
  window[cbName] = function(data) {
    delete window[cbName];
    document.getElementById(cbName)?.remove();
    cb(data);
  };
  const url = CONFIG.API_URL + '?callback=' + cbName + '&payload=' + encodeURIComponent(JSON.stringify(payload));
  const s = document.createElement('script');
  s.id = cbName;
  s.src = url;
  s.onerror = function() {
    delete window[cbName];
    s.remove();
    showToast('❌ 서버 연결 실패\n배포 설정(액세스: 모든 사용자)을 확인하세요');
  };
  document.head.appendChild(s);
}

// ── 역할 탭 ──
function setRole(role) {
  currentRole = role;
  ['admin','teacher','student'].forEach(r => {
    document.getElementById('tab' + r.charAt(0).toUpperCase() + r.slice(1)).classList.toggle('active', r === role);
  });
  document.getElementById('loginIdLabel').textContent = role === 'student' ? '학번' : '아이디';
}

// ── 로그인 ──
function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value.trim();
  if (!id || !pw) return showToast('아이디와 비밀번호를 입력하세요');

  if (currentRole === 'admin') {
    if (id === CONFIG.ADMIN_ID && pw === CONFIG.ADMIN_PW) loginSuccess({ role: 'admin', name: '관리자', id });
    else showToast('❌ 관리자 인증 실패');
    return;
  }
  if (currentRole === 'teacher') {
    callAPI({ action: 'authTeacher', teacherId: id, teacherPw: pw }, res => {
      if (res.success) loginSuccess({ role: 'teacher', name: res.name || id, id, pw });
      else showToast('❌ ' + (res.error || '교사 인증 실패'));
    });
    return;
  }
  if (currentRole === 'student') {
    callAPI({ action: 'getStudentScore', id, pw }, res => {
      if (res.error) { showToast('❌ ' + res.error); return; }
      loginSuccess({ role: 'student', name: res.name, id, pw, scoreData: res });
    });
  }
}

function loginSuccess(user) {
  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userBadge').textContent =
    (user.role === 'admin' ? '🔑 ' : user.role === 'teacher' ? '👩‍🏫 ' : '🎒 ') + user.name;
  setupNav();

  if (user.role === 'teacher') {
    document.getElementById('tId').value = user.id;
    document.getElementById('tPw').value = user.pw;
    loadStudents();
    buildItemButtons();
  } else if (user.role === 'admin') {
    loadStudents();
    buildItemButtons();
    loadAdminDash();
  } else if (user.role === 'student') {
    setupStudentView(user.scoreData);
  }
}

function doLogout() {
  currentUser = null; allStudents = []; selectedItem = null; allHistory = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
}

// ── 네비게이션 ──
const NAVS = {
  admin:   [{ id:'viewDash', icon:'📊', label:'통계' }, { id:'viewInput', icon:'✏️', label:'입력' }, { id:'viewHistory', icon:'📋', label:'기록' }],
  teacher: [{ id:'viewInput', icon:'✏️', label:'입력' }, { id:'viewHistory', icon:'📋', label:'내 기록' }],
  student: [{ id:'viewMyScore', icon:'🏆', label:'내 점수' }],
};
function setupNav() {
  const nav = document.getElementById('bottomNav');
  const items = NAVS[currentUser.role];
  nav.innerHTML = items.map(n => `
    <button class="nav-item" onclick="switchView('${n.id}',this)">
      <span class="ni">${n.icon}</span>${n.label}
    </button>`).join('');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(items[0].id)?.classList.add('active');
  nav.querySelector('.nav-item')?.classList.add('active');
  document.getElementById('teacherAuthArea').classList.toggle('hidden', currentUser.role === 'student');
}

function switchView(viewId, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId)?.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (viewId === 'viewHistory') loadHistory();
  if (viewId === 'viewDash') loadAdminDash();
}

// ── 학생 목록 ──
function loadStudents() {
  if (_studentCache) {
    allStudents = _studentCache;
    renderStudentList(allStudents);
    return;
  }
  callAPI({ action: 'getAllStudents' }, res => {
    if (res.students) {
      allStudents = res.students;
      _studentCache = res.students;
      renderStudentList(allStudents);
    }
  });
}

function renderStudentList(arr) {
  const el = document.getElementById('studentList');
  if (!arr.length) { el.innerHTML = '<div class="empty-state"><span class="ei">👥</span>학생 없음</div>'; return; }
  el.innerHTML = arr.map(s => `
    <div class="student-item" onclick="toggleStudent(this)">
      <input type="checkbox" class="schk" value="${s.id}" data-name="${s.name}" onclick="event.stopPropagation()">
      <div><div class="sname">${s.name}</div><div class="sid">${s.id}</div></div>
    </div>`).join('');
}

function filterStudents() {
  const v = document.getElementById('searchInput').value.toLowerCase();
  renderStudentList(allStudents.filter(s => s.id.includes(v) || s.name.includes(v)));
}

function toggleStudent(el) {
  const chk = el.querySelector('.schk');
  chk.checked = !chk.checked;
  updateSummary();
}

// ── 항목 탭 전환 ──
function switchItemTab(tab) {
  currentItemTab = tab;
  document.getElementById('tabReward').className = 'item-tab' + (tab === 'reward' ? ' active-reward' : '');
  document.getElementById('tabPenalty').className = 'item-tab' + (tab === 'penalty' ? ' active-penalty' : '');
  document.getElementById('panelReward').classList.toggle('active', tab === 'reward');
  document.getElementById('panelPenalty').classList.toggle('active', tab === 'penalty');
}

// ── 항목 버튼 생성 (아코디언) ──
function buildItemButtons() {
  buildAccordion('panelReward', CONFIG.REWARD_ITEMS, 'reward');
  buildAccordion('panelPenalty', CONFIG.PENALTY_ITEMS, 'penalty');
}

function buildAccordion(containerId, items, type) {
  // 담임 / 일반 분리
  const general  = items.filter(i => !i.isHomeroom);
  const homeroom = items.filter(i => i.isHomeroom);
  const el = document.getElementById(containerId);
  el.innerHTML =
    makeAccSection('일반 항목', general, type, 'gen_' + type, true) +
    (homeroom.length ? makeAccSection('담임 전용 항목', homeroom, type, 'hr_' + type, false) : '');
  // 이벤트는 HTML onclick으로 처리
}

function makeAccSection(title, items, type, id, open) {
  const btns = items.map(item => {
    const limitBadge = item.limit ? `<span class="limit-badge">월${item.limit}점 한도</span>` : '';
    return `<button class="item-btn" onclick="selectItem(this,'${esc(item.value)}',${item.score},'${type}')" data-value="${esc(item.value)}">
      <span>${item.label}${limitBadge}</span>
      <span class="sb ${item.score > 0 ? 'pos':'neg'}">${item.score > 0 ? '+'+item.score : item.score}</span>
    </button>`;
  }).join('');
  return `
  <div class="acc-header ${open ? 'open' : ''}" onclick="toggleAcc(this)">
    <span>${title} (${items.length}개)</span>
    <span class="acc-arrow">▼</span>
  </div>
  <div class="acc-body ${open ? 'open' : ''}" id="${id}">${btns}</div>`;
}

function esc(s) { return s.replace(/'/g, "\\'"); }

function toggleAcc(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function selectItem(btn, value, score, type) {
  document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('sel-r', 'sel-p'));
  if (selectedItem && selectedItem.value === value) { selectedItem = null; updateSummary(); return; }
  btn.classList.add(type === 'reward' ? 'sel-r' : 'sel-p');
  selectedItem = { value, score, type };
  updateSummary();
}

// ── 요약 ──
function updateSummary() {
  const cnt = document.querySelectorAll('.schk:checked').length;
  const sc = selectedItem ? selectedItem.score : 0;
  const sumEl = document.getElementById('sumScore');
  const txtEl = document.getElementById('sumText');
  if (!cnt || !selectedItem) {
    txtEl.textContent = '학생·항목을 선택하세요';
    sumEl.textContent = '0점'; sumEl.style.color = 'var(--muted)'; return;
  }
  txtEl.textContent = `${cnt}명 × ${selectedItem.value}`;
  sumEl.textContent = (sc > 0 ? '+' : '') + sc + '점';
  sumEl.style.color = sc > 0 ? 'var(--success)' : 'var(--danger)';
}

// ── 저장 ──
function saveRecord() {
  const tId = document.getElementById('tId').value.trim();
  const tPw = document.getElementById('tPw').value.trim();
  const chks = document.querySelectorAll('.schk:checked');
  if (currentUser.role !== 'admin' && (!tId || !tPw)) return showToast('교사 ID/PW를 입력하세요');
  if (!chks.length) return showToast('학생을 선택하세요');
  if (!selectedItem) return showToast('항목을 선택하세요');
  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>처리 중…';
  callAPI({
    action: 'saveBatchData',
    teacherId: tId || CONFIG.ADMIN_ID, teacherPw: tPw || CONFIG.ADMIN_PW,
    reason: selectedItem.value, score: selectedItem.score,
    students: Array.from(chks).map(c => ({ id: c.value, name: c.dataset.name }))
  }, res => {
    btn.disabled = false; btn.textContent = '💾 기록하기';
    showToast(res.message || String(res));
    document.querySelectorAll('.schk:checked').forEach(c => c.checked = false);
    document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('sel-r','sel-p'));
    selectedItem = null;
    document.getElementById('searchInput').value = '';
    renderStudentList(allStudents);
    updateSummary();
  });
}

// ── 기록 조회 ──
function loadHistory() {
  const tId = document.getElementById('tId').value.trim();
  const tPw = document.getElementById('tPw').value.trim();
  if (currentUser.role === 'teacher' && (!tId || !tPw)) {
    document.getElementById('historyList').innerHTML = '<div class="empty-state"><span class="ei">🔑</span>교사 정보를 먼저 입력하세요</div>';
    return;
  }
  document.getElementById('historyList').innerHTML = '<div class="empty-state"><span class="ei">⏳</span>불러오는 중…</div>';
  callAPI({ action: 'getTeacherHistory', teacherId: tId || CONFIG.ADMIN_ID, teacherPw: tPw || CONFIG.ADMIN_PW }, res => {
    if (res.error) { showToast('❌ ' + res.error); return; }
    allHistory = res.history || [];
    renderHistory();
  });
}

function filterHistory(f, el) {
  historyFilter = f;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  let list = allHistory;
  if (historyFilter === 'reward')  list = list.filter(h => h.score > 0);
  if (historyFilter === 'penalty') list = list.filter(h => h.score < 0);
  if (!list.length) { el.innerHTML = '<div class="empty-state"><span class="ei">📭</span>기록이 없습니다</div>'; return; }
  el.innerHTML = list.map(h => `
    <div class="record-item">
      <div class="ri">
        <div class="rn">${h.studentName} <span style="color:var(--muted);font-size:.7rem">(${h.studentId})</span></div>
        <div class="rm">${h.date} · ${h.reason}</div>
      </div>
      <div class="rr">
        <div class="rec-score ${h.score > 0 ? 'pos':'neg'}">${h.score > 0 ? '+'+h.score : h.score}점</div>
        <button class="btn-del" onclick="delRecord('${h.date}','${h.studentId}','${h.studentName}')">취소</button>
      </div>
    </div>`).join('');
}

function delRecord(date, sId, sName) {
  if (!confirm(`[${date}] ${sName} 학생의 기록을 취소하시겠습니까?`)) return;
  const tId = document.getElementById('tId').value.trim();
  const tPw = document.getElementById('tPw').value.trim();
  callAPI({ action: 'deleteRecord', date, studentId: sId, teacherId: tId || CONFIG.ADMIN_ID, teacherPw: tPw || CONFIG.ADMIN_PW }, res => {
    showToast(res.message || String(res));
    loadHistory();
  });
}

// ── 학생 점수 ──
function searchStudent() {
  const sid = document.getElementById('sSid').value.trim();
  const spw = document.getElementById('sSpw').value.trim();
  if (!sid || !spw) return showToast('학번과 비밀번호를 입력하세요');
  callAPI({ action: 'getStudentScore', id: sid, pw: spw }, res => {
    if (res.error) { showToast('❌ ' + res.error); return; }
    setupStudentView(res);
  });
}

function setupStudentView(data) {
  const history = data.history || [];
  document.getElementById('myScoreContent').innerHTML = `
    <div class="score-hero">
      <div class="hn">${data.name} 학생</div>
      <div class="hs">${data.total}점</div>
      <div class="hl">누적 드림포인트</div>
    </div>
    <div class="card">
      <div class="card-title">상세 내역</div>
      ${history.length ? history.map(x => `
        <div class="score-row">
          <span class="rd">${x.date}</span>
          <span class="rr2">${x.reason}</span>
          <span class="rs ${parseFloat(x.score) >= 0 ? 'rec-score pos':'rec-score neg'}">${x.score}</span>
        </div>`).join('') : '<div class="empty-state"><span class="ei">📭</span>기록 없음</div>'}
    </div>`;
}

// ── 관리자 통계 ──
function loadAdminDash() {
  callAPI({ action: 'getAdminStats', adminId: CONFIG.ADMIN_ID, adminPw: CONFIG.ADMIN_PW }, res => {
    if (res.error) { showToast('❌ ' + res.error); return; }
    document.getElementById('statTotal').textContent = res.totalCount || 0;
    document.getElementById('statReward').textContent = res.totalReward || 0;
    document.getElementById('statPenalty').textContent = Math.abs(res.totalPenalty || 0);
    document.getElementById('statStudents').textContent = res.studentCount || 0;
    const rankEl = document.getElementById('rankList');
    const ranks = res.topStudents || [];
    rankEl.innerHTML = ranks.length ? ranks.map((s, i) => `
      <div class="rank-item">
        <div class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div>
        <div class="rank-name">${s.name} <span style="color:var(--muted);font-size:.7rem">(${s.id})</span></div>
        <div class="rank-score">${s.total}점</div>
      </div>`).join('') : '<div class="empty-state"><span class="ei">🏆</span>데이터 없음</div>';
    const recEl = document.getElementById('allRecordList');
    const recs = res.recentRecords || [];
    recEl.innerHTML = recs.length ? recs.map(h => `
      <div class="record-item">
        <div class="ri">
          <div class="rn">${h.studentName} <span style="color:var(--muted);font-size:.7rem">(${h.studentId})</span></div>
          <div class="rm">${h.date} · ${h.reason} · ${h.teacherId}</div>
        </div>
        <div class="rr">
          <div class="rec-score ${h.score > 0 ? 'pos':'neg'}">${h.score > 0 ? '+'+h.score : h.score}점</div>
        </div>
      </div>`).join('') : '<div class="empty-state"><span class="ei">📭</span>기록 없음</div>';
  });
}

// ── 토스트 ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
