<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>드림포인트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
/* ══ 리셋 & 기본 ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

/* ══ CSS 변수 ══ */
:root {
  --p: #2563eb;
  --ok: #16a34a;
  --ng: #dc2626;
  --warn: #f59e0b;
  --bg: #f1f5f9;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --muted: #64748b;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 8px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08);
}

/* ══ 로그인 ══ */
#loginWrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: linear-gradient(150deg, #1e3a8a 0%, #1d4ed8 50%, #0369a1 100%);
}
.login-card {
  background: #fff;
  border-radius: 20px;
  padding: 36px 28px 28px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 24px 64px rgba(0,0,0,.24);
  animation: slideUp .35s ease;
}
.login-logo {
  text-align: center;
  margin-bottom: 24px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.login-logo .emoji { font-size: 2.4rem; display: block; margin-bottom: 6px; }
.login-logo h1 { font-size: 1.4rem; font-weight: 900; color: var(--p); letter-spacing: -.5px; }
.login-logo p { font-size: .74rem; color: var(--muted); margin-top: 3px; }

.role-seg {
  display: flex;
  background: var(--bg);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 16px;
  gap: 3px;
}
.role-seg button {
  flex: 1;
  padding: 8px 4px;
  border: none;
  border-radius: 8px;
  font-size: .74rem;
  font-weight: 700;
  color: var(--muted);
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.role-seg button.on {
  background: #fff;
  color: var(--p);
  box-shadow: 0 1px 4px rgba(0,0,0,.12);
}

#adminReveal {
  display: none;
  width: 100%;
  padding: 9px;
  margin-bottom: 12px;
  background: #fff5f5;
  color: var(--ng);
  border: 1.5px solid #fecaca;
  border-radius: 8px;
  font-size: .75rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}

.form-field { margin-bottom: 11px; }
.form-field label { display: block; font-size: .72rem; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
.form-field input {
  width: 100%;
  height: 44px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 0 13px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
  background: #fff;
}
.form-field input:focus { border-color: var(--p); }

.btn-login {
  width: 100%;
  height: 46px;
  background: var(--p);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: .95rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s, transform .1s;
}
.btn-login:hover { background: #1d4ed8; }
.btn-login:active { transform: scale(.98); }

/* ══ 앱 레이아웃 ══ */
#appWrap { display: none; min-height: 100vh; flex-direction: column; }
#appWrap.on { display: flex; }

/* 헤더 */
.app-header {
  height: 52px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.header-logo { font-size: .9rem; font-weight: 900; color: var(--p); }
.header-right { display: flex; align-items: center; gap: 8px; }
.user-chip {
  background: #eff6ff;
  color: var(--p);
  border-radius: 20px;
  padding: 4px 11px;
  font-size: .7rem;
  font-weight: 700;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.btn-logout {
  border: 1.5px solid var(--border);
  background: none;
  border-radius: 7px;
  padding: 4px 10px;
  font-size: .68rem;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
}

/* 탭 네비 (모바일 하단 / 데스크톱 상단) */
.tab-bar {
  display: flex;
  background: #fff;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  padding: 0 8px;
  gap: 2px;
  flex-shrink: 0;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 14px;
  font-size: .68rem;
  font-weight: 700;
  color: var(--muted);
  border: none;
  background: none;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  gap: 2px;
}
.tab-item .t-icon { font-size: 1.1rem; line-height: 1; }
.tab-item.on { color: var(--p); border-bottom-color: var(--p); }

/* 바디 */
.app-body { display: flex; flex: 1; overflow: hidden; }
.main-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.main-pad { padding: 16px; max-width: 720px; margin: 0 auto; }

/* 데스크톱 사이드바 */
.sidebar { display: none; }
@media (min-width: 860px) {
  .tab-bar { display: none; }
  .sidebar {
    display: flex;
    flex-direction: column;
    width: 180px;
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 12px 8px;
    gap: 2px;
    flex-shrink: 0;
  }
  .sidebar .tab-item {
    flex-direction: row;
    justify-content: flex-start;
    padding: 10px 12px;
    border-bottom: none;
    border-radius: 8px;
    font-size: .8rem;
    gap: 8px;
  }
  .sidebar .tab-item .t-icon { font-size: 1rem; }
  .sidebar .tab-item.on, .sidebar .tab-item:hover { background: #eff6ff; color: var(--p); }
  .main-pad { padding: 20px 24px; max-width: none; }
}

/* ══ 공통 컴포넌트 ══ */
.view { display: none; }
.view.on { display: block; animation: slideUp .2s ease; }

.page-title { font-size: 1rem; font-weight: 900; margin-bottom: 14px; }

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.card-title {
  font-size: .68rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 10px;
}

/* 빈 상태 */
.empty-state { text-align: center; padding: 28px 16px; color: #94a3b8; font-size: .8rem; }
.empty-state .ei { font-size: 2rem; display: block; margin-bottom: 6px; opacity: .3; }

/* 버튼들 */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  height: 42px;
  padding: 0 18px;
  background: var(--p);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: .84rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s, transform .1s;
}
.btn-primary:active { transform: scale(.97); opacity: .88; }
.btn-primary:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary.full { width: 100%; height: 46px; font-size: .9rem; }
.btn-primary.green { background: var(--ok); }
.btn-primary.red   { background: var(--ng); }

.btn-sm {
  height: 30px;
  padding: 0 10px;
  border-radius: 6px;
  font-size: .68rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  border: 1.5px solid var(--border);
  background: #fff;
  color: var(--muted);
  transition: all .12s;
}
.btn-sm.danger { border-color: var(--ng); color: var(--ng); }
.btn-sm.primary { border-color: var(--p); color: var(--p); }

/* 칩 필터 */
.chip-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.chip {
  padding: 5px 13px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: #fff;
  font-size: .71rem;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
  transition: all .12s;
}
.chip.on { background: var(--p); border-color: var(--p); color: #fff; }

/* 스피너 */
.spinner {
  display: inline-block;
  width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .5s linear infinite;
  vertical-align: middle;
  margin-right: 5px;
}

/* 토스트 */
#toast {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1e293b;
  color: #fff;
  padding: 10px 20px;
  border-radius: 22px;
  font-size: .78rem;
  font-weight: 700;
  opacity: 0;
  transition: all .22s;
  pointer-events: none;
  white-space: pre-line;
  text-align: center;
  max-width: 86vw;
  z-index: 1000;
  box-shadow: var(--shadow-md);
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ 입력 화면 ══ */

/* 교사 인증 바 */
.auth-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 13px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.auth-bar .auth-label {
  font-size: .7rem;
  font-weight: 700;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}
.auth-bar input {
  flex: 1;
  min-width: 0;
  height: 34px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 0 9px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  background: var(--bg);
  transition: border-color .15s;
}
.auth-bar input:focus { border-color: var(--p); background: #fff; }

/* 3단 그리드 */
.input-3col { display: flex; flex-direction: column; gap: 10px; }
@media (min-width: 860px) {
  .input-3col {
    flex-direction: row;
    align-items: stretch;
    height: calc(100vh - 200px);
    gap: 12px;
  }
  .col-students, .col-reward, .col-penalty { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .col-students .stu-list,
  .col-reward .items-scroll,
  .col-penalty .items-scroll { flex: 1; max-height: none !important; }
  /* 모바일 탭 숨김 */
  .mobile-tabs { display: none !important; }
  /* 데스크톱 패널 항상 표시 */
  .item-panel { display: block !important; }
}

/* 컬럼 헤더 */
.col-header {
  padding: 10px 12px;
  font-size: .78rem;
  font-weight: 900;
  text-align: center;
  border-radius: var(--radius) var(--radius) 0 0;
  flex-shrink: 0;
}
.col-header.blue   { background: var(--p);  color: #fff; }
.col-header.green  { background: var(--ok); color: #fff; }
.col-header.red    { background: var(--ng); color: #fff; }

.col-body {
  background: #fff;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* 학생 검색 */
.stu-search {
  width: 100%;
  height: 38px;
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  background: #fafbff;
  flex-shrink: 0;
}
.stu-search:focus { background: #fff; }

.stu-list {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  max-height: 260px;
}
.stu-item {
  display: flex;
  align-items: center;
  padding: 9px 12px;
  border-bottom: 1px solid #f1f5f9;
  cursor: pointer;
  gap: 9px;
  transition: background .1s;
}
.stu-item:last-child { border-bottom: none; }
.stu-item:hover, .stu-item:active { background: #eff6ff; }
.stu-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--p); flex-shrink: 0; }
.stu-item .stu-name { font-size: .84rem; font-weight: 700; }
.stu-item .stu-id   { font-size: .65rem; color: var(--muted); }

/* 모바일 상/벌점 탭 */
.mobile-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mobile-tabs button {
  flex: 1;
  padding: 9px;
  border: none;
  background: #f8fafc;
  font-size: .8rem;
  font-weight: 700;
  color: #94a3b8;
  cursor: pointer;
  font-family: inherit;
  transition: all .12s;
  border-bottom: 2px solid transparent;
}
.mobile-tabs .on-r { background: #f0fdf4; color: var(--ok); border-bottom-color: var(--ok); }
.mobile-tabs .on-p { background: #fff1f2; color: var(--ng); border-bottom-color: var(--ng); }

.item-panel { display: none; }
.item-panel.on { display: block; }

.items-scroll { max-height: 280px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* 항목 버튼 */
.item-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border: none;
  border-bottom: 1px solid #f1f5f9;
  background: #fff;
  font-family: inherit;
  font-size: .8rem;
  color: var(--text);
  width: 100%;
  text-align: left;
  min-height: 42px;
  cursor: pointer;
  transition: background .1s;
}
.item-btn:last-child { border-bottom: none; }
.item-btn:hover, .item-btn:active { background: #f8fafc; }
.item-btn.sel-r { background: #f0fdf4; }
.item-btn.sel-p { background: #fff1f2; }
.item-score { font-size: .78rem; font-weight: 900; min-width: 28px; text-align: right; flex-shrink: 0; }
.item-score.pos { color: var(--ok); }
.item-score.neg { color: var(--ng); }
.limit-tag {
  font-size: .55rem;
  background: #fef3c7;
  color: #92400e;
  border-radius: 3px;
  padding: 1px 4px;
  margin-left: 3px;
  font-weight: 700;
  vertical-align: middle;
}

/* 요약 + 저장 */
.summary-bar {
  background: #eff6ff;
  border: 1.5px solid #bfdbfe;
  border-radius: var(--radius);
  padding: 10px 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.summary-bar .s-text  { font-size: .75rem; font-weight: 700; color: var(--p); }
.summary-bar .s-score { font-size: .95rem; font-weight: 900; }

/* ══ 기록 화면 ══ */
.record-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 13px;
  border-radius: 9px;
  margin-bottom: 6px;
  background: #fafbff;
  border: 1px solid var(--border);
}
.record-item .r-name  { font-size: .84rem; font-weight: 700; }
.record-item .r-meta  { font-size: .66rem; color: var(--muted); margin-top: 2px; }
.record-item .r-right { text-align: right; flex-shrink: 0; margin-left: 8px; }
.r-score { font-size: .88rem; font-weight: 900; }
.r-score.pos { color: var(--ok); }
.r-score.neg { color: var(--ng); }

/* ══ 학생 점수 화면 ══ */
.score-hero {
  background: linear-gradient(135deg, #1e40af, #0ea5e9);
  border-radius: 16px;
  padding: 26px 20px;
  text-align: center;
  color: #fff;
  margin-bottom: 10px;
}
.score-hero .s-name  { font-size: .82rem; opacity: .8; margin-bottom: 3px; }
.score-hero .s-total { font-size: 2.8rem; font-weight: 900; line-height: 1; }
.score-hero .s-label { font-size: .68rem; opacity: .65; margin-top: 4px; }

.score-row {
  display: flex;
  align-items: center;
  padding: 9px 12px;
  border-bottom: 1px solid #f1f5f9;
  gap: 6px;
  font-size: .78rem;
}
.score-row:last-child { border-bottom: none; }
.score-row .r-date    { font-size: .65rem; color: var(--muted); flex-shrink: 0; min-width: 36px; }
.score-row .r-reason  { flex: 1; }
.score-row .r-sc      { font-weight: 900; flex-shrink: 0; min-width: 32px; text-align: right; }
.score-row .r-teacher { font-size: .62rem; color: #94a3b8; flex-shrink: 0; min-width: 44px; text-align: right; }

/* ══ 관리자 통계 ══ */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
@media (min-width: 500px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
.stat-box {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 8px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-box .stat-label { font-size: .65rem; font-weight: 700; color: var(--muted); margin-bottom: 3px; }
.stat-box .stat-val   { font-size: 1.4rem; font-weight: 900; color: var(--p); }
.stat-box.ok  .stat-val { color: var(--ok); }
.stat-box.ng  .stat-val { color: var(--ng); }

.rank-item {
  display: flex;
  align-items: center;
  padding: 9px 12px;
  border-bottom: 1px solid #f1f5f9;
  gap: 9px;
}
.rank-item:last-child { border-bottom: none; }
.rank-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 900;
  flex-shrink: 0;
  background: var(--bg); color: var(--muted);
}
.rank-num.g { background: #fef3c7; color: #d97706; }
.rank-num.s { background: #f1f5f9; color: #64748b; }
.rank-num.b { background: #fff7ed; color: #c2410c; }
.rank-name  { flex: 1; font-size: .84rem; font-weight: 700; }
.rank-score { font-size: .88rem; font-weight: 900; color: var(--p); }

/* 필터 셀렉트 */
.fsel {
  height: 32px;
  padding: 0 9px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  font-size: .73rem;
  font-family: inherit;
  outline: none;
  background: #fff;
  cursor: pointer;
}

/* ══ 애니메이션 ══ */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ════════════════════════════
     로그인
════════════════════════════ -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-logo" id="loginLogo" onclick="logoTap()">
      <span class="emoji">🏫</span>
      <h1 id="sysTitle">드림포인트</h1>
      <p  id="sysSub">학생 상벌점 관리 시스템</p>
    </div>

    <div class="role-seg">
      <button id="roleTeacher" class="on" onclick="setRole('teacher')">👩‍🏫 교사</button>
      <button id="roleStudent"             onclick="setRole('student')">🎒 학생</button>
    </div>
    <button id="adminReveal" onclick="setRole('admin')">🔑 관리자 모드 진입</button>

    <div class="form-field">
      <label id="loginLabel">아이디</label>
      <input type="text" id="loginId" autocomplete="off" autocapitalize="none" placeholder="아이디 입력">
    </div>
    <div class="form-field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">로그인 →</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════════════════════════════════════
   전역 상태 (var G 하나로 관리)
════════════════════════════════════ */
var G = {
  role:       'teacher',
  user:       null,
  students:   [],
  picked:     null,
  pickedVal:  null,
  curTab:     'r',          // 모바일 상/벌점 탭
  histAll:    [],
  histFilter: 'all',
  adminData:  null,
  isMobile:   true
};

/* ════════════════════════════════════
   초기화
════════════════════════════════════ */
(function init() {
  // 시스템명 적용
  document.getElementById('sysTitle').textContent = CONFIG.SYSTEM_NAME    || '드림포인트';
  document.getElementById('sysSub').textContent   = CONFIG.SYSTEM_SUBTITLE || '학생 상벌점 관리 시스템';

  // 색상 변수 적용
  if (CONFIG.COLOR) {
    var r = document.documentElement.style;
    if (CONFIG.COLOR.primary) r.setProperty('--p',    CONFIG.COLOR.primary);
    if (CONFIG.COLOR.success) r.setProperty('--ok',   CONFIG.COLOR.success);
    if (CONFIG.COLOR.danger)  r.setProperty('--ng',   CONFIG.COLOR.danger);
    if (CONFIG.COLOR.warning) r.setProperty('--warn', CONFIG.COLOR.warning);
  }

  // 브레이크포인트
  function checkBP() { G.isMobile = window.innerWidth < 860; }
  checkBP();
  window.addEventListener('resize', function() {
    var prev = G.isMobile;
    G.isMobile = window.innerWidth < 860;
    if (prev !== G.isMobile && G.user && G.user.role !== 'student') applyLayout();
  });

  // 학생 목록 미리 받기
  prefetchStudents();
})();

/* ════════════════════════════════════
   JSONP API
════════════════════════════════════ */
var _seq = 0;
function api(payload, cb) {
  var name  = '_dp' + (++_seq);
  var timer = setTimeout(function() {
    if (window[name]) { delete window[name]; showToast('❌ 응답 시간 초과 (15초)'); }
  }, 15000);

  window[name] = function(data) {
    clearTimeout(timer);
    delete window[name];
    var el = document.getElementById(name);
    if (el && el.parentNode) el.parentNode.removeChild(el);
    cb(data);
  };

  var s = document.createElement('script');
  s.id  = name;
  s.src = CONFIG.API_URL
        + '?callback=' + name
        + '&payload='  + encodeURIComponent(JSON.stringify(payload));
  s.onerror = function() {
    clearTimeout(timer);
    delete window[name];
    if (s.parentNode) s.parentNode.removeChild(s);
    showToast('❌ 서버 연결 실패');
  };
  document.head.appendChild(s);
}

/* ════════════════════════════════════
   학생 목록 캐시 (localStorage 30분)
════════════════════════════════════ */
var CACHE_KEY = 'dp_stu', CACHE_TTL = 30 * 60 * 1000;

function prefetchStudents() {
  try {
    var raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      var o = JSON.parse(raw);
      if (Date.now() - o.ts < CACHE_TTL) { G.students = o.d; return; }
    }
  } catch(e) {}
  api({ action: 'getAllStudents' }, function(r) {
    if (r && r.students) { G.students = r.students; saveCache(r.students); }
  });
}
function saveCache(arr) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), d: arr })); } catch(e) {}
}
function ensureStudents() {
  if (G.students.length > 0) { renderStudents(G.students); return; }
  api({ action: 'getAllStudents' }, function(r) {
    if (r && r.students) {
      G.students = r.students;
      saveCache(r.students);
      renderStudents(r.students);
    }
  });
}

/* ════════════════════════════════════
   로그인
════════════════════════════════════ */
var _logoTaps = 0, _logoTimer = null;
function logoTap() {
  _logoTaps++;
  clearTimeout(_logoTimer);
  _logoTimer = setTimeout(function() { _logoTaps = 0; }, 2000);
  if (_logoTaps >= 5) {
    _logoTaps = 0;
    document.getElementById('adminReveal').style.display = 'block';
    showToast('🔑 관리자 모드 활성화');
  }
}

function setRole(r) {
  G.role = r;
  document.getElementById('roleTeacher').classList.toggle('on', r === 'teacher');
  document.getElementById('roleStudent').classList.toggle('on', r === 'student');
  document.getElementById('loginLabel').textContent = r === 'student' ? '학번' : '아이디';
}

function doLogin() {
  var id = document.getElementById('loginId').value.trim();
  var pw = document.getElementById('loginPw').value.trim();
  if (!id || !pw) { showToast('아이디와 비밀번호를 입력하세요'); return; }

  if (G.role === 'admin') {
    if (id === CONFIG.ADMIN_ID && pw === CONFIG.ADMIN_PW) {
      onLoginSuccess({ role: 'admin', name: '관리자', id: id, pw: pw });
    } else {
      showToast('❌ 관리자 인증 실패');
    }
    return;
  }

  if (G.role === 'teacher') {
    api({ action: 'authTeacher', teacherId: id, teacherPw: pw }, function(r) {
      if (r && r.success) {
        var nm = (r.name && typeof r.name === 'string') ? r.name : id;
        onLoginSuccess({ role: 'teacher', name: nm, id: id, pw: pw });
      } else {
        showToast('❌ ' + (r && r.error ? r.error : '교사 인증 실패'));
      }
    });
    return;
  }

  // 학생
  api({ action: 'getStudentScore', id: id, pw: pw }, function(r) {
    if (r && r.mustChangePw) { showToast('⚠️ 비밀번호 변경 필요\n담임선생님께 문의하세요'); return; }
    if (r && r.error)        { showToast('❌ ' + r.error); return; }
    if (r && r.name)         { onLoginSuccess({ role: 'student', name: r.name, id: id, pw: pw, scoreData: r }); }
    else                     { showToast('❌ 로그인 실패'); }
  });
}

function onLoginSuccess(u) {
  G.user = u;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').classList.add('on');

  var pfx = { admin: '🔑 ', teacher: '👩‍🏫 ', student: '🎒 ' }[u.role] || '';
  document.getElementById('userChip').textContent = pfx + u.name;

  buildNav();

  if (u.role === 'teacher' || u.role === 'admin') {
    // 관리자는 교사 인증 바 숨김
    var ab = document.getElementById('authBar');
    if (u.role === 'admin') { ab.style.display = 'none'; }
    else { document.getElementById('tId').value = u.id; document.getElementById('tPw').value = u.pw; }
    ensureStudents();
    buildItemButtons();
    applyLayout();
  }

  if (u.role === 'student')  { renderScore(u.scoreData); }
  if (u.role === 'admin')    { loadAdminStats(); }
}

function doLogout() {
  G.user = null; G.students = []; G.picked = null; G.pickedVal = null;
  G.histAll = []; G.adminData = null;
  document.getElementById('appWrap').classList.remove('on');
  document.getElementById('appWrap').style.display = '';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
}

/* ════════════════════════════════════
   네비게이션
════════════════════════════════════ */
var NAVS = {
  teacher: [{ id:'vInput',   ic:'✏️', lb:'입력'   }, { id:'vHistory', ic:'📋', lb:'기록'    }],
  student: [{ id:'vScore',   ic:'🏆', lb:'내 점수' }],
  admin:   [{ id:'vInput',   ic:'✏️', lb:'입력'   }, { id:'vHistory', ic:'📋', lb:'기록'    },
            { id:'vDash',    ic:'📊', lb:'통계'   }]
};

function buildNav() {
  var items = NAVS[G.user.role] || [];
  var html  = items.map(function(n) {
    return '<button class="tab-item" data-view="' + n.id + '" onclick="switchView(\'' + n.id + '\',this)">'
         + '<span class="t-icon">' + n.ic + '</span>' + n.lb + '</button>';
  }).join('');
  document.getElementById('tabBar').innerHTML = html;
  document.getElementById('sidebar').innerHTML = html;

  // 첫 뷰 활성화
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('on'); });
  if (items.length) {
    document.getElementById(items[0].id).classList.add('on');
    document.querySelectorAll('[data-view="' + items[0].id + '"]').forEach(function(b) { b.classList.add('on'); });
  }
}

function switchView(id, el) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('on'); });
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.tab-item').forEach(function(b) {
    b.classList.toggle('on', b.getAttribute('data-view') === id);
  });
  if (id === 'vHistory') loadHistory();
  if (id === 'vDash' && !G.adminData) loadAdminStats();
}

/* ════════════════════════════════════
   레이아웃 (모바일 ↔ 데스크톱)
════════════════════════════════════ */
function applyLayout() {
  var mob = G.isMobile;
  document.getElementById('mobileTabs').style.display  = mob ? ''     : 'none';
  document.getElementById('deskHeadR').style.display   = mob ? 'none' : '';
  document.getElementById('colPenalty').style.display  = mob ? 'none' : '';
  document.getElementById('panelP').style.display      = mob ? ''     : 'none';
  if (!mob) buildItems('itemsP2', CONFIG.PENALTY_ITEMS, 'p');
  if (mob) {
    document.getElementById('panelR').classList.toggle('on', G.curTab === 'r');
    document.getElementById('panelP').classList.toggle('on', G.curTab === 'p');
  } else {
    document.getElementById('panelR').classList.add('on');
  }
}

/* ════════════════════════════════════
   학생 목록 렌더
════════════════════════════════════ */
function renderStudents(arr) {
  var el = document.getElementById('stuList');
  if (!arr || !arr.length) {
    el.innerHTML = '<div class="empty-state"><span class="ei">👥</span>학생 없음</div>'; return;
  }
  el.innerHTML = arr.map(function(s) {
    return '<div class="stu-item" onclick="toggleStu(this)">'
         + '<input type="checkbox" class="schk" value="' + esc(s.id) + '" data-name="' + esc(s.name) + '"'
         + ' onclick="event.stopPropagation()">'
         + '<div><div class="stu-name">' + s.name + '</div>'
         + '<div class="stu-id">' + s.id + '</div></div></div>';
  }).join('');
}
function filterStudents() {
  var q = document.getElementById('stuSearch').value.toLowerCase();
  renderStudents(G.students.filter(function(s) { return s.id.includes(q) || s.name.includes(q); }));
}
function toggleStu(el) {
  var c = el.querySelector('.schk');
  c.checked = !c.checked;
  updateSummary();
}

/* ════════════════════════════════════
   항목 버튼
════════════════════════════════════ */
function buildItemButtons() {
  buildItems('itemsR', CONFIG.REWARD_ITEMS,  'r');
  buildItems('itemsP', CONFIG.PENALTY_ITEMS, 'p');
}

function buildItems(id, items, type) {
  var el = document.getElementById(id); if (!el) return;
  // value+score 조합 중복 제거
  var seen = {}, deduped = [];
  items.forEach(function(item) {
    var k = item.value + '|' + item.score;
    if (!seen[k]) { seen[k] = true; deduped.push(item); }
  });
  el.innerHTML = deduped.map(function(item) {
    var v  = esc(item.value);
    var lb = item.limit ? '<span class="limit-tag">월' + item.limit + '점</span>' : '';
    return '<button class="item-btn"'
         + ' onclick="pickItem(this,\'' + v + '\',' + item.score + ',\'' + type + '\')"'
         + ' data-v="' + v + '">'
         + '<span>' + item.label + lb + '</span>'
         + '<span class="item-score ' + (item.score > 0 ? 'pos' : 'neg') + '">'
         + (item.score > 0 ? '+' : '') + item.score + '</span>'
         + '</button>';
  }).join('');
}

function switchMobileTab(t) {
  G.curTab = t;
  document.getElementById('mTabR').className = t === 'r' ? 'on-r' : '';
  document.getElementById('mTabP').className = t === 'p' ? 'on-p' : '';
  document.getElementById('panelR').classList.toggle('on', t === 'r');
  document.getElementById('panelP').classList.toggle('on', t === 'p');
}

function pickItem(btn, val, sc, type) {
  if (G.pickedVal === val) {
    G.picked = null; G.pickedVal = null;
    document.querySelectorAll('.item-btn').forEach(function(b) { b.classList.remove('sel-r','sel-p'); });
    updateSummary(); return;
  }
  G.pickedVal = val; G.picked = { value: val, score: sc, type: type };
  document.querySelectorAll('.item-btn').forEach(function(b) { b.classList.remove('sel-r','sel-p'); });
  document.querySelectorAll('.item-btn[data-v="' + val + '"').forEach(function(b) {
    b.classList.add(type === 'r' ? 'sel-r' : 'sel-p');
  });
  updateSummary();
}

function updateSummary() {
  var cnt  = document.querySelectorAll('.schk:checked').length;
  var sc   = G.picked ? G.picked.score : 0;
  var sEl  = document.getElementById('sumScore');
  var tEl  = document.getElementById('sumText');
  if (!cnt || !G.picked) {
    tEl.textContent = '학생과 항목을 선택하세요';
    sEl.textContent = '0점'; sEl.style.color = '#94a3b8'; return;
  }
  tEl.textContent = cnt + '명 × ' + G.picked.value;
  sEl.textContent = (sc > 0 ? '+' : '') + sc + '점';
  sEl.style.color = sc > 0 ? 'var(--ok)' : 'var(--ng)';
}

/* ════════════════════════════════════
   저장
════════════════════════════════════ */
function saveRecord() {
  var tId  = document.getElementById('tId').value.trim();
  var tPw  = document.getElementById('tPw').value.trim();
  var chks = document.querySelectorAll('.schk:checked');
  if (G.user.role === 'teacher' && (!tId || !tPw)) { showToast('교사 ID / 비밀번호를 입력하세요'); return; }
  if (!chks.length)  { showToast('학생을 선택하세요'); return; }
  if (!G.picked)     { showToast('항목을 선택하세요');  return; }

  var btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>처리 중…';

  api({
    action:    'saveBatchData',
    teacherId: tId || CONFIG.ADMIN_ID,
    teacherPw: tPw || CONFIG.ADMIN_PW,
    reason:    G.picked.value,
    score:     G.picked.score,
    students:  Array.from(chks).map(function(c) { return { id: c.value, name: c.dataset.name }; })
  }, function(r) {
    btn.disabled = false;
    btn.textContent = '💾 기록하기';
    showToast(r && r.message ? r.message : String(r));
    // 초기화
    document.querySelectorAll('.schk:checked').forEach(function(c) { c.checked = false; });
    document.querySelectorAll('.item-btn').forEach(function(b) { b.classList.remove('sel-r','sel-p'); });
    G.picked = null; G.pickedVal = null;
    document.getElementById('stuSearch').value = '';
    renderStudents(G.students); updateSummary();
  });
}

/* ════════════════════════════════════
   기록 조회 + 취소
════════════════════════════════════ */
function loadHistory() {
  var tId = document.getElementById('tId').value.trim();
  var tPw = document.getElementById('tPw').value.trim();
  if (G.user.role === 'teacher' && (!tId || !tPw)) {
    document.getElementById('histList').innerHTML =
      '<div class="empty-state"><span class="ei">🔑</span>교사 정보를 먼저 입력하세요</div>'; return;
  }
  document.getElementById('histList').innerHTML =
    '<div class="empty-state"><span class="ei">⏳</span>불러오는 중…</div>';
  api({
    action:    'getTeacherHistory',
    teacherId: tId || CONFIG.ADMIN_ID,
    teacherPw: tPw || CONFIG.ADMIN_PW
  }, function(r) {
    if (r && r.error) { showToast('❌ ' + r.error); return; }
    G.histAll = (r && r.history) ? r.history : [];
    renderHistory();
  });
}
function setHistFilter(f, btn) {
  G.histFilter = f;
  document.querySelectorAll('#vHistory .chip').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on'); renderHistory();
}
function renderHistory() {
  var el   = document.getElementById('histList');
  var list = G.histAll;
  if (G.histFilter === 'r') list = list.filter(function(h) { return h.score > 0; });
  if (G.histFilter === 'p') list = list.filter(function(h) { return h.score < 0; });
  if (!list.length) { el.innerHTML = '<div class="empty-state"><span class="ei">📭</span>기록이 없습니다</div>'; return; }
  el.innerHTML = list.map(function(h) {
    var nm = esc(h.studentName);
    return '<div class="record-item">'
         + '<div><div class="r-name">' + h.studentName
         + ' <span style="color:#94a3b8;font-size:.62rem">(' + h.studentId + ')</span></div>'
         + '<div class="r-meta">' + h.date + ' · ' + h.reason + '</div></div>'
         + '<div class="r-right">'
         + '<div class="r-score ' + (h.score > 0 ? 'pos' : 'neg') + '">'
         + (h.score > 0 ? '+' : '') + h.score + '점</div>'
         + '<button class="btn-sm danger" style="margin-top:4px"'
         + ' onclick="cancelRecord(' + h.rowIndex + ',\'' + nm + '\')">취소</button>'
         + '</div></div>';
  }).join('');
}
function cancelRecord(rowIndex, name) {
  if (!confirm('[' + name + '] 기록을 취소하시겠습니까?')) return;
  var tId = document.getElementById('tId').value.trim();
  var tPw = document.getElementById('tPw').value.trim();
  api({
    action:    'deleteRecord',
    rowIndex:  rowIndex,
    teacherId: tId || CONFIG.ADMIN_ID,
    teacherPw: tPw || CONFIG.ADMIN_PW
  }, function(r) {
    showToast(r && r.message ? r.message : String(r));
    loadHistory();
  });
}

/* ════════════════════════════════════
   학생 점수 조회
════════════════════════════════════ */
function searchScore() {
  var id = document.getElementById('stuId').value.trim();
  var pw = document.getElementById('stuPw').value.trim();
  if (!id || !pw) { showToast('학번과 비밀번호를 입력하세요'); return; }
  api({ action: 'getStudentScore', id: id, pw: pw }, function(r) {
    if (r && r.mustChangePw) { showToast('⚠️ 비밀번호 변경 필요\n담임선생님께 문의하세요'); return; }
    if (r && r.error)        { showToast('❌ ' + r.error); return; }
    renderScore(r);
  });
}
function renderScore(data) {
  if (!data) return;
  var rows = (data.history || []).map(function(x) {
    return '<div class="score-row">'
         + '<span class="r-date">'    + x.date        + '</span>'
         + '<span class="r-reason">'  + x.reason      + '</span>'
         + '<span class="r-sc '       + (parseFloat(x.score) >= 0 ? 'pos' : 'neg') + '">' + x.score + '</span>'
         + '<span class="r-teacher">' + (x.teacherName || '') + '</span>'
         + '</div>';
  }).join('') || '<div class="empty-state"><span class="ei">📭</span>기록 없음</div>';

  document.getElementById('scoreArea').innerHTML =
      '<div class="score-hero">'
    + '<div class="s-name">'  + data.name  + ' 학생</div>'
    + '<div class="s-total">' + data.total + '점</div>'
    + '<div class="s-label">누적 드림포인트</div>'
    + '</div>'
    + '<div class="card">'
    + '<div class="card-title">상세 내역</div>'
    + rows
    + '</div>';
}

/* ════════════════════════════════════
   관리자 통계
════════════════════════════════════ */
function loadAdminStats() {
  api({ action: 'getAdminStats' }, function(r) {
    if (r && r.error) { showToast('❌ ' + r.error); return; }
    G.adminData = r;
    document.getElementById('sTotal').textContent    = r.totalCount    || 0;
    document.getElementById('sReward').textContent   = r.totalReward   || 0;
    document.getElementById('sPenalty').textContent  = Math.abs(r.totalPenalty || 0);
    document.getElementById('sStudents').textContent = r.studentCount  || 0;
    // 월 셀렉트 채우기
    var ms = document.getElementById('fMonth');
    if (ms.options.length <= 1) {
      Object.keys(r.monthlyRanks || {}).sort().reverse().forEach(function(ym) {
        var o = document.createElement('option'); o.value = ym; o.textContent = ym; ms.appendChild(o);
      });
    }
    renderRank();
  });
}
function onGradeChange() {
  var g  = document.getElementById('fGrade').value;
  var fc = document.getElementById('fClass');
  fc.innerHTML = '<option value="">전 반</option>';
  if (g && G.adminData) {
    var cs = {};
    (G.adminData.topStudents || []).forEach(function(s) { if (String(s.grade) === g) cs[String(s.cls)] = 1; });
    Object.keys(cs).sort().forEach(function(c) {
      var o = document.createElement('option'); o.value = c; o.textContent = c + '반'; fc.appendChild(o);
    });
  }
  renderRank();
}
function renderRank() {
  if (!G.adminData) return;
  var mon   = document.getElementById('fMonth').value;
  var grade = document.getElementById('fGrade').value;
  var cls   = document.getElementById('fClass').value;
  var list  = mon ? (G.adminData.monthlyRanks[mon] || []) : (G.adminData.topStudents || []);
  if (grade) list = list.filter(function(s) { return String(s.grade) === grade; });
  if (cls)   list = list.filter(function(s) { return String(s.cls)   === cls;   });
  var el = document.getElementById('rankList');
  if (!list.length) { el.innerHTML = '<div class="empty-state"><span class="ei">📊</span>데이터 없음</div>'; return; }
  el.innerHTML = list.slice(0, 20).map(function(s, i) {
    return '<div class="rank-item">'
         + '<div class="rank-num ' + (i===0?'g':i===1?'s':i===2?'b':'') + '">' + (i+1) + '</div>'
         + '<div class="rank-name">' + s.name
         + ' <span style="color:#94a3b8;font-size:.62rem">(' + s.id + ')</span></div>'
         + '<div class="rank-score">' + s.total + '점</div>'
         + '</div>';
  }).join('');
}

/* ════════════════════════════════════
   유틸
════════════════════════════════════ */
function esc(v) { return String(v || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

var _toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('on'); }, 3000);
}
</script>
</body>
</html>
