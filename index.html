<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>드림포인트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4ff;color:#1e293b;min-height:100vh}

/* ─── 로그인 ─── */
#LS{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:linear-gradient(135deg,#1e40af,#0ea5e9)}
.lbox{background:#fff;border-radius:20px;padding:30px 24px;width:100%;max-width:360px;
      box-shadow:0 20px 60px rgba(0,0,0,.2);animation:up .3s ease}
.llogo{text-align:center;margin-bottom:18px;cursor:pointer;user-select:none}
.llogo .ico{font-size:2.2rem;display:block;margin-bottom:3px}
.llogo h1{font-size:1.35rem;font-weight:900;color:#2563eb}
.llogo p{font-size:.73rem;color:#64748b;margin-top:1px}
.rtabs{display:flex;gap:4px;background:#f0f4ff;border-radius:10px;padding:3px;margin-bottom:14px}
.rtab{flex:1;padding:9px 4px;text-align:center;border-radius:7px;font-size:.75rem;font-weight:700;
      color:#64748b;border:none;background:transparent;cursor:pointer;font-family:inherit;transition:all .13s}
.rtab.on{background:#fff;color:#2563eb;box-shadow:0 1px 5px rgba(0,0,0,.09)}
#aBtn{display:none;width:100%;padding:9px;margin-bottom:11px;background:#fff3f3;color:#dc2626;
      border:1.5px solid #fecaca;border-radius:8px;font-size:.78rem;font-weight:700;font-family:inherit;cursor:pointer}
.fg{margin-bottom:10px}
.fg label{font-size:.72rem;font-weight:700;color:#64748b;display:block;margin-bottom:3px}
.fg input{width:100%;height:44px;border:1.5px solid #e2e8f0;border-radius:9px;padding:0 12px;
          font-size:16px;font-family:inherit;outline:none;transition:border-color .13s}
.fg input:focus{border-color:#2563eb}
.bpri{width:100%;height:48px;background:#2563eb;color:#fff;border:none;border-radius:10px;
      font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .13s}
.bpri:active{opacity:.85}

/* ─── 앱 골격 ─── */
#APP{display:none;min-height:100vh;flex-direction:column}
#APP.on{display:flex}

/* ─── 헤더 ─── */
.hdr{height:50px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;
     justify-content:space-between;padding:0 14px;flex-shrink:0;
     box-shadow:0 1px 5px rgba(0,0,0,.05);position:sticky;top:0;z-index:200}
.hdr-logo{font-size:.9rem;font-weight:900;color:#2563eb}
.hdr-r{display:flex;align-items:center;gap:6px}
.badge{background:#f0f4ff;border-radius:14px;padding:3px 9px;font-size:.69rem;font-weight:700;
       color:#2563eb;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blg{background:none;border:1.5px solid #e2e8f0;border-radius:6px;padding:3px 8px;
     font-size:.67rem;font-weight:700;color:#64748b;cursor:pointer;font-family:inherit}

/* ─── 탭 헤더 (공통 — 상단 고정 버튼형) ─── */
.tab-bar{display:flex;gap:4px;padding:8px 14px;background:#fff;border-bottom:1px solid #e2e8f0;
         flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.titem{padding:6px 16px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;
       font-size:.75rem;font-weight:700;color:#64748b;cursor:pointer;font-family:inherit;
       white-space:nowrap;transition:all .12s;flex-shrink:0}
.titem.on{background:#2563eb;border-color:#2563eb;color:#fff}

/* ─── 콘텐츠 영역 ─── */
.body-wrap{display:flex;flex:1;overflow:hidden}

/* ─── 사이드바 (데스크톱 ≥768) ─── */
.sidebar{display:none}
@media(min-width:768px){
  .sidebar{display:flex;flex-direction:column;width:170px;background:#fff;
           border-right:1px solid #e2e8f0;padding:12px 8px;gap:3px;flex-shrink:0;
           overflow-y:auto}
  .sidebar .titem{border-radius:9px;border:none;background:transparent;text-align:left;
                  padding:9px 12px;font-size:.8rem;display:flex;align-items:center;gap:7px}
  .sidebar .titem.on{background:#f0f4ff;color:#2563eb}
  .sidebar .titem:hover{background:#f0f4ff}
  /* 상단 tab-bar 데스크톱에서 숨김 */
  .tab-bar.mobile-only{display:none}
}
@media(max-width:767px){
  .sidebar{display:none}
}

/* ─── 메인 스크롤 ─── */
.mc{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
@media(min-width:768px){.mc{padding:18px 20px}}

/* ─── 뷰 ─── */
.view{display:none}
.view.on{display:block;animation:up .18s ease}
.stitle{font-size:.95rem;font-weight:900;margin-bottom:10px}

/* ─── 카드 ─── */
.card{background:#fff;border-radius:11px;padding:13px;margin-bottom:9px;
      box-shadow:0 1px 8px rgba(37,99,235,.07)}
.ctit{font-size:.68rem;font-weight:700;color:#64748b;margin-bottom:7px;
      letter-spacing:.3px;text-transform:uppercase}

/* ─── 통계 ─── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
@media(min-width:500px){.sg{grid-template-columns:repeat(4,1fr)}}
.sb{background:#fff;border-radius:11px;padding:12px 7px;text-align:center;
    box-shadow:0 1px 8px rgba(37,99,235,.07)}
.sb .sl{font-size:.63rem;font-weight:700;color:#64748b;margin-bottom:1px}
.sb .sv{font-size:1.25rem;font-weight:900;color:#2563eb}
.sb.g .sv{color:#16a34a} .sb.r .sv{color:#dc2626}

/* ─── 입력 레이아웃 ─── */
/* 모바일: 세로 스택 */
.inp-wrap{display:flex;flex-direction:column;gap:9px}
/* 데스크톱: 상단 학생검색 가로, 하단 상벌점 좌우 */
@media(min-width:768px){
  .inp-wrap{flex-direction:column}
  .inp-bottom{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .inp-full{grid-column:1/-1}
  .slist{max-height:160px!important}
}

/* ─── 학생 검색 ─── */
.si{width:100%;height:41px;border:1.5px solid #e2e8f0;border-radius:9px;padding:0 11px;
    font-size:16px;font-family:inherit;outline:none;margin-bottom:6px;transition:border-color .13s}
.si:focus{border-color:#2563eb}
.slist{max-height:190px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:9px;
       background:#fafbff;-webkit-overflow-scrolling:touch}
.sit{display:flex;align-items:center;padding:9px 11px;border-bottom:1px solid #f1f5f9;cursor:pointer;gap:8px}
.sit:last-child{border-bottom:none}
.sit:active,.sit:hover{background:#eff6ff}
.sit input[type=checkbox]{width:17px;height:17px;accent-color:#2563eb;flex-shrink:0}
.sit .sn{font-size:.84rem;font-weight:700}
.sit .si2{font-size:.66rem;color:#64748b}

/* ─── 상벌점 컬럼 제목 ─── */
.col-r,.col-p{border-radius:11px;overflow:hidden;box-shadow:0 1px 8px rgba(37,99,235,.07)}
.col-head{padding:10px 12px;font-size:.8rem;font-weight:900;text-align:center}
.col-head.cr{background:#16a34a;color:#fff}
.col-head.cp{background:#dc2626;color:#fff}
.col-body{background:#fff;max-height:340px;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:768px){.col-body{max-height:calc(100vh - 360px)}}

/* ─── 모바일 상벌점 탭 ─── */
.itabs-m{display:flex;border-radius:9px;overflow:hidden;border:1.5px solid #e2e8f0;margin-bottom:7px}
.itabs-m button{flex:1;padding:10px;font-size:.82rem;font-weight:700;border:none;
                background:#f8fafc;color:#94a3b8;cursor:pointer;font-family:inherit;transition:all .12s}
.itabs-m .ar{background:#16a34a;color:#fff}
.itabs-m .ap{background:#dc2626;color:#fff}
.ipanel{display:none}
.ipanel.on{display:block}
@media(min-width:768px){
  .itabs-m{display:none}
  .ipanel{display:block!important}
}

/* ─── 항목 버튼 ─── */
.ib{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;
    border-bottom:1px solid #f1f5f9;cursor:pointer;background:#fff;font-family:inherit;
    font-size:.8rem;color:#1e293b;width:100%;text-align:left;min-height:44px;border-left:none;
    border-right:none;border-top:none;transition:background .1s}
.ib:last-child{border-bottom:none}
.ib:active,.ib:hover{background:#f8fafc}
.ib.sr{background:#f0fdf4}
.ib.sp{background:#fff1f2}
.ib .sc{font-size:.79rem;font-weight:900;min-width:28px;text-align:right;flex-shrink:0}
.sc.pos{color:#16a34a} .sc.neg{color:#dc2626}
.lb{font-size:.55rem;background:#fef3c7;color:#92400e;border-radius:3px;padding:1px 4px;
    margin-left:3px;font-weight:700;vertical-align:middle}

/* ─── 요약바 + 저장 ─── */
.sumbar{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:9px;padding:10px 12px;
        display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.sumbar .st{font-size:.76rem;font-weight:700;color:#2563eb}
.sumbar .ss{font-size:.97rem;font-weight:900}
.bsv{width:100%;height:48px;background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;
     border:none;border-radius:10px;font-size:.94rem;font-weight:700;cursor:pointer;
     font-family:inherit;box-shadow:0 3px 10px rgba(37,99,235,.22);transition:opacity .13s}
.bsv:active{opacity:.85}
.bsv:disabled{opacity:.44;cursor:not-allowed}

/* ─── 교사 인증 ─── */
.tauth{display:flex;gap:6px;margin-bottom:8px}
.tauth input{flex:1;height:40px;border:1.5px solid #e2e8f0;border-radius:8px;padding:0 10px;
             font-size:15px;font-family:inherit;outline:none;transition:border-color .13s}
.tauth input:focus{border-color:#2563eb}

/* ─── 기록 목록 ─── */
.tfil{display:flex;gap:4px;margin-bottom:8px}
.tb{padding:5px 12px;border-radius:14px;border:1.5px solid #e2e8f0;background:#fff;
    font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;color:#64748b;transition:all .1s}
.tb.on{background:#2563eb;border-color:#2563eb;color:#fff}
.ri{display:flex;justify-content:space-between;align-items:center;padding:10px 11px;
    border-radius:9px;margin-bottom:5px;background:#fafbff;border:1px solid #e2e8f0}
.ri .ln{font-size:.84rem;font-weight:700}
.ri .lm{font-size:.66rem;color:#64748b;margin-top:1px}
.ri .rr{text-align:right;flex-shrink:0;margin-left:8px}
.rsc{font-size:.88rem;font-weight:900}
.rsc.pos{color:#16a34a} .rsc.neg{color:#dc2626}
.bdel{font-size:.62rem;padding:2px 7px;border-radius:5px;border:1px solid #dc2626;
      color:#dc2626;background:none;cursor:pointer;font-family:inherit;margin-top:3px}
.bedit{font-size:.62rem;padding:2px 7px;border-radius:5px;border:1px solid #2563eb;
       color:#2563eb;background:none;cursor:pointer;font-family:inherit;margin-top:3px;margin-right:3px}

/* ─── 학생 점수 ─── */
.shero{background:linear-gradient(135deg,#1e40af,#0ea5e9);border-radius:14px;padding:24px 16px;
       text-align:center;color:#fff;margin-bottom:9px}
.shero .hn{font-size:.82rem;opacity:.8;margin-bottom:2px}
.shero .hs{font-size:2.6rem;font-weight:900}
.shero .hl{font-size:.69rem;opacity:.6}
.srow{display:flex;padding:9px 11px;border-bottom:1px solid #f1f5f9;font-size:.78rem;gap:4px;align-items:center}
.srow:last-child{border-bottom:none}
.srow .sd{color:#64748b;font-size:.67rem;flex-shrink:0;min-width:38px}
.srow .sr{flex:1}
.srow .ss2{font-weight:900;flex-shrink:0;min-width:32px;text-align:right}
.srow .ste{font-size:.63rem;color:#64748b;flex-shrink:0;min-width:44px;text-align:right}

/* ─── 비밀번호 변경 화면 (학생 강제) ─── */
#pwChange{display:none;position:fixed;inset:0;background:rgba(30,64,175,.95);z-index:900;
          align-items:center;justify-content:center;padding:20px}
#pwChange.on{display:flex}
.pwbox{background:#fff;border-radius:18px;padding:28px 22px;width:100%;max-width:340px}
.pwbox h2{font-size:1rem;font-weight:900;margin-bottom:5px;color:#1e293b}
.pwbox p{font-size:.78rem;color:#64748b;margin-bottom:16px}

/* ─── 담임 비번관리 ─── */
.cls-row{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;
         border-bottom:1px solid #f1f5f9}
.cls-row:last-child{border-bottom:none}
.cls-row .cn{font-size:.84rem;font-weight:700}
.cls-row .ci{font-size:.66rem;color:#64748b}
.cls-row .ca{display:flex;gap:5px;flex-shrink:0;margin-left:8px}
.breset{font-size:.62rem;padding:3px 8px;border-radius:5px;border:1px solid #f59e0b;
        color:#92400e;background:#fef3c7;cursor:pointer;font-family:inherit}
.bchpw{font-size:.62rem;padding:3px 8px;border-radius:5px;border:1px solid #2563eb;
       color:#2563eb;background:none;cursor:pointer;font-family:inherit}
.flag-badge{font-size:.58rem;background:#fef3c7;color:#92400e;border-radius:3px;
            padding:1px 4px;margin-left:4px;font-weight:700}

/* ─── 랭킹 ─── */
.fsel{padding:5px 8px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:.73rem;
      font-family:inherit;outline:none;background:#fff;cursor:pointer}
.rk{display:flex;align-items:center;padding:8px 11px;border-bottom:1px solid #f1f5f9;gap:8px}
.rk:last-child{border-bottom:none}
.rn{width:21px;height:21px;border-radius:50%;background:#f0f4ff;font-size:.67rem;font-weight:900;
    display:flex;align-items:center;justify-content:center;color:#64748b;flex-shrink:0}
.rn.g{background:#fef3c7;color:#d97706} .rn.s{background:#f1f5f9;color:#475569} .rn.b{background:#fff7ed;color:#c2410c}
.rnm{flex:1;font-size:.82rem;font-weight:700}
.rsc2{font-size:.85rem;font-weight:900;color:#2563eb}

/* ─── 모달 ─── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;
       align-items:center;justify-content:center;padding:16px}
#modal.on{display:flex}
.mbox{background:#fff;border-radius:15px;padding:20px 18px;width:100%;max-width:320px;
      box-shadow:0 8px 40px rgba(0,0,0,.18);animation:up .18s ease}
.mbox h3{font-size:.9rem;font-weight:900;margin-bottom:11px}
.mbox select,.mbox input[type=number]{width:100%;height:40px;border:1.5px solid #e2e8f0;border-radius:8px;
  padding:0 9px;font-size:14px;font-family:inherit;outline:none;margin-bottom:8px}
.mbtns{display:flex;gap:6px}
.mbtns button{flex:1;height:40px;border:none;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;font-family:inherit}
.mok{background:#2563eb;color:#fff} .mcan{background:#f0f4ff;color:#64748b}

/* ─── 유틸 ─── */
.empty{text-align:center;padding:22px 10px;color:#94a3b8;font-size:.77rem}
.empty .ei{font-size:1.8rem;display:block;margin-bottom:4px;opacity:.28}
.hidden{display:none!important}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;animation:sp .5s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes up{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(8px);
       background:#1e293b;color:#fff;padding:9px 17px;border-radius:20px;font-size:.78rem;
       font-weight:700;opacity:0;transition:all .18s;pointer-events:none;
       white-space:pre-line;text-align:center;max-width:84vw;z-index:999}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ════ 로그인 ════ -->
<div id="LS">
  <div class="lbox">
    <div class="llogo" id="llogo" onclick="ltap()">
      <span class="ico">🏫</span>
      <h1 id="ltitle">드림포인트</h1>
      <p id="lsub">학생 상벌점 관리 시스템</p>
    </div>
    <div class="rtabs">
      <button class="rtab on" id="tabT" onclick="setRole('teacher')">👩‍🏫 교사</button>
      <button class="rtab" id="tabS" onclick="setRole('student')">🎒 학생</button>
    </div>
    <button id="aBtn" onclick="setRole('admin')">🔑 관리자 모드 진입</button>
    <div class="fg"><label id="lbl">아이디</label>
      <input type="text" id="lid" autocomplete="off" autocapitalize="none" placeholder="아이디 입력"></div>
    <div class="fg"><label>비밀번호</label>
      <input type="password" id="lpw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="bpri" onclick="doLogin()">로그인 →</button>
  </div>
</div>

<!-- ════ 비밀번호 강제변경 오버레이 ════ -->
<div id="pwChange">
  <div class="pwbox">
    <h2>🔒 비밀번호 변경 필요</h2>
    <p>담임선생님이 비밀번호를 초기화했습니다.<br>새 비밀번호를 설정해야 계속할 수 있습니다.</p>
    <div class="fg"><label>새 비밀번호 (4자 이상)</label>
      <input type="password" id="newPw1" placeholder="새 비밀번호"></div>
    <div class="fg"><label>새 비밀번호 확인</label>
      <input type="password" id="newPw2" placeholder="비밀번호 확인" onkeydown="if(event.key==='Enter')submitNewPw()"></div>
    <button class="bpri" onclick="submitNewPw()">변경하기</button>
  </div>
</div>

<!-- ════ 앱 ════ -->
<div id="APP">
  <!-- 헤더 -->
  <header class="hdr">
    <div class="hdr-logo">🏫 드림포인트</div>
    <div class="hdr-r">
      <div class="badge" id="ubadge"></div>
      <button class="blg" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <!-- 상단 탭바 (모바일용) -->
  <div class="tab-bar mobile-only" id="topNav"></div>

  <div class="body-wrap">
    <!-- 사이드바 (데스크톱) -->
    <nav class="sidebar" id="sideNav"></nav>

    <!-- 메인 -->
    <div class="mc" id="mc">

      <!-- ── 입력 뷰 ── -->
      <div class="view on" id="vInput">
        <div id="taArea">
          <div class="card">
            <div class="ctit">교사 인증</div>
            <div class="tauth">
              <input type="text" id="tId" placeholder="교사 ID" autocapitalize="none">
              <input type="password" id="tPw" placeholder="비밀번호">
            </div>
          </div>
        </div>
        <div class="inp-wrap">
          <!-- 학생 검색 -->
          <div class="card">
            <div class="ctit">학생 선택</div>
            <input class="si" type="search" id="ssearch" placeholder="🔍 이름 또는 학번" oninput="filterS()">
            <div class="slist" id="slist"><div class="empty"><span class="ei">⏳</span>로딩 중…</div></div>
          </div>
          <!-- 상벌점 항목 -->
          <div class="inp-bottom">
            <!-- 모바일: 탭 방식 -->
            <div class="card" id="mobileItems">
              <div class="itabs-m">
                <button id="tabR" onclick="switchTab('r')">✅ 상점</button>
                <button id="tabP" onclick="switchTab('p')">❌ 벌점</button>
              </div>
              <div class="ipanel on" id="panR"></div>
              <div class="ipanel" id="panP"></div>
            </div>
            <!-- 데스크톱: 상점/벌점 나란히 -->
            <div class="col-r" id="deskR" style="display:none">
              <div class="col-head cr">✅ 상점 항목</div>
              <div class="col-body" id="dR"></div>
            </div>
            <div class="col-p" id="deskP" style="display:none">
              <div class="col-head cp">❌ 벌점 항목</div>
              <div class="col-body" id="dP"></div>
            </div>
            <!-- 요약 + 저장 -->
            <div class="inp-full">
              <div class="sumbar">
                <div class="st" id="stxt">학생·항목을 선택하세요</div>
                <div class="ss" id="ssc" style="color:#94a3b8">0점</div>
              </div>
              <button class="bsv" id="bsv" onclick="saveRec()">💾 기록하기</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ── 기록 뷰 ── -->
      <div class="view" id="vHist">
        <p class="stitle">📋 내 입력 기록</p>
        <div class="tfil">
          <button class="tb on" onclick="fHist('all',this)">전체</button>
          <button class="tb" onclick="fHist('r',this)">상점</button>
          <button class="tb" onclick="fHist('p',this)">벌점</button>
        </div>
        <div id="hlist"><div class="empty"><span class="ei">📭</span>기록 없음</div></div>
      </div>

      <!-- ── 학생 점수 뷰 ── -->
      <div class="view" id="vScore">
        <p class="stitle">🏆 나의 드림포인트</p>
        <div id="scoreWrap">
          <div class="card">
            <div class="ctit">학번 & 비밀번호로 조회</div>
            <div class="fg"><label>학번</label><input type="text" id="ssid" inputmode="numeric" placeholder="학번 입력"></div>
            <div class="fg"><label>비밀번호</label><input type="password" id="sspw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')searchStu()"></div>
            <button class="bsv" onclick="searchStu()">조회하기</button>
          </div>
        </div>
      </div>

      <!-- ── 관리자: 통계 ── -->
      <div class="view" id="vDash">
        <p class="stitle">📊 전체 현황</p>
        <div class="sg">
          <div class="sb"><div class="sl">기록수</div><div class="sv" id="stTotal">-</div></div>
          <div class="sb g"><div class="sl">상점합계</div><div class="sv" id="stR">-</div></div>
          <div class="sb r"><div class="sl">벌점합계</div><div class="sv" id="stP">-</div></div>
          <div class="sb"><div class="sl">참여학생</div><div class="sv" id="stS">-</div></div>
        </div>
        <div class="card">
          <div class="ctit">🏆 순위 조회</div>
          <div style="display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap">
            <select class="fsel" id="fMonth" onchange="renderRank()"><option value="">전체 기간</option></select>
            <select class="fsel" id="fGrade" onchange="onGradeChange()"><option value="">전 학년</option><option>1</option><option>2</option><option>3</option></select>
            <select class="fsel" id="fClass" onchange="renderRank()"><option value="">전 반</option></select>
          </div>
          <div id="rankList"><div class="empty"><span class="ei">⏳</span>로딩 중…</div></div>
        </div>
      </div>

      <!-- ── 관리자: 기록 수정 ── -->
      <div class="view" id="vEdit">
        <p class="stitle">✏️ 상벌점 수정</p>
        <div class="tfil">
          <button class="tb on" onclick="fEdit('all',this)">전체</button>
          <button class="tb" onclick="fEdit('r',this)">상점</button>
          <button class="tb" onclick="fEdit('p',this)">벌점</button>
        </div>
        <input class="si" type="search" id="esearch" placeholder="🔍 학생 이름/학번 검색" oninput="renderEdit()" style="margin-bottom:8px">
        <div id="elist"><div class="empty"><span class="ei">⏳</span>로딩 중…</div></div>
      </div>

      <!-- ── 교사: 담임 비번관리 ── -->
      <div class="view" id="vClass">
        <p class="stitle">🔑 우리 반 비밀번호 관리</p>
        <div id="clsList"><div class="empty"><span class="ei">⏳</span>로딩 중…</div></div>
      </div>

    </div><!-- /mc -->
  </div><!-- /body-wrap -->
</div><!-- /APP -->

<!-- 수정 모달 -->
<div id="modal">
  <div class="mbox">
    <h3>기록 수정</h3>
    <select id="mReason"></select>
    <input type="number" id="mScore" placeholder="점수 (양수=상점, 음수=벌점)">
    <div class="mbtns">
      <button class="mcan" onclick="closeModal()">취소</button>
      <button class="mok" onclick="submitEdit()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════
// 전역 상태
// ════════════════════════════════════════
var G = {
  role:'teacher', user:null,
  students:[], picked:null, pickedV:null, curTab:'r',
  histList:[], histF:'all',
  editList:[], editF:'all', editRow:null,
  adminData:null,
  clsStudents:[],
  isMobile:true
};

// ════════════════════════════════════════
// 초기화
// ════════════════════════════════════════
(function init(){
  // 테마
  var t=CONFIG.THEME, s=document.documentElement.style;
  s.setProperty('--p',t.primary);
  document.getElementById('ltitle').textContent=CONFIG.SYSTEM_NAME;
  document.getElementById('lsub').textContent=CONFIG.SYSTEM_SUBTITLE;
  // 브레이크포인트
  function chk(){ G.isMobile=window.innerWidth<768; }
  chk(); window.addEventListener('resize',function(){ G.isMobile=window.innerWidth<768; if(G.user&&G.user.role!=='student') applyLayout(); });
  // 프리로드
  prefetchStudents();
})();

// ════════════════════════════════════════
// JSONP API (15초 타임아웃)
// ════════════════════════════════════════
var cbIdx=0;
function api(payload,cb){
  var n='_dp'+(++cbIdx);
  var timer=setTimeout(function(){ if(window[n]){delete window[n]; toast('❌ 응답 시간 초과');} },15000);
  window[n]=function(data){
    clearTimeout(timer); delete window[n];
    var el=document.getElementById(n); if(el&&el.parentNode)el.parentNode.removeChild(el);
    cb(data);
  };
  var s=document.createElement('script');
  s.id=n;
  s.src=CONFIG.API_URL+'?callback='+n+'&payload='+encodeURIComponent(JSON.stringify(payload));
  s.onerror=function(){
    clearTimeout(timer); delete window[n];
    if(s.parentNode)s.parentNode.removeChild(s);
    toast('❌ 서버 연결 실패');
  };
  document.head.appendChild(s);
}

// ════════════════════════════════════════
// 학생 목록 캐시
// ════════════════════════════════════════
var SKEY='dp_stu', STTL=30*60*1000;
function prefetchStudents(){
  try{
    var raw=localStorage.getItem(SKEY);
    if(raw){ var o=JSON.parse(raw); if(Date.now()-o.ts<STTL){G.students=o.d;return;} }
  }catch(e){}
  api({action:'getAllStudents'},function(r){
    if(r&&r.students){ G.students=r.students; saveStudentCache(r.students); }
  });
}
function saveStudentCache(arr){
  try{ localStorage.setItem(SKEY,JSON.stringify({ts:Date.now(),d:arr})); }catch(e){}
}
function loadStudents(){
  if(G.students.length>0){ renderStudents(G.students); return; }
  api({action:'getAllStudents'},function(r){
    if(r&&r.students){ G.students=r.students; saveStudentCache(r.students); renderStudents(G.students); }
  });
}

// ════════════════════════════════════════
// 로그인
// ════════════════════════════════════════
var ltapCount=0, ltapTimer=null;
function ltap(){
  ltapCount++; clearTimeout(ltapTimer);
  ltapTimer=setTimeout(function(){ltapCount=0;},2000);
  if(ltapCount>=5){ ltapCount=0; document.getElementById('aBtn').style.display='block'; toast('🔑 관리자 모드 활성화'); }
}
function setRole(r){
  G.role=r;
  document.getElementById('tabT').classList.toggle('on',r==='teacher');
  document.getElementById('tabS').classList.toggle('on',r==='student');
  document.getElementById('lbl').textContent=r==='student'?'학번':'아이디';
}
function doLogin(){
  var id=document.getElementById('lid').value.trim();
  var pw=document.getElementById('lpw').value.trim();
  if(!id||!pw){ toast('아이디와 비밀번호를 입력하세요'); return; }

  if(G.role==='admin'){
    if(id===CONFIG.ADMIN_ID&&pw===CONFIG.ADMIN_PW){
      onLoginSuccess({role:'admin',name:'관리자',id:id,pw:pw});
    } else {
      toast('❌ 관리자 인증 실패');
    }
    return;
  }
  if(G.role==='teacher'){
    api({action:'authTeacher',teacherId:id,teacherPw:pw},function(r){
      if(r&&r.success){
        onLoginSuccess({role:'teacher',name:r.name||id,id:id,pw:pw});
      } else {
        toast('❌ '+(r&&r.error?r.error:'교사 인증 실패'));
      }
    });
    return;
  }
  // 학생
  api({action:'getStudentScore',id:id,pw:pw},function(r){
    if(r&&r.mustChangePw){
      // 비밀번호 변경 강제
      G.pendingStudent={id:id, name:r.name};
      document.getElementById('pwChange').classList.add('on');
      return;
    }
    if(r&&r.error){ toast('❌ '+r.error); return; }
    if(r&&r.name){ onLoginSuccess({role:'student',name:r.name,id:id,pw:pw,sd:r}); }
    else { toast('❌ 로그인 실패'); }
  });
}
function submitNewPw(){
  var p1=document.getElementById('newPw1').value.trim();
  var p2=document.getElementById('newPw2').value.trim();
  if(!p1||p1.length<4){ toast('비밀번호는 4자 이상이어야 합니다'); return; }
  if(p1!==p2){ toast('비밀번호가 일치하지 않습니다'); return; }
  var st=G.pendingStudent;
  api({action:'updateMyPw',id:st.id,oldPw:document.getElementById('lpw').value.trim(),newPw:p1},function(r){
    if(r&&r.error){ toast('❌ '+r.error); return; }
    toast(r&&r.message?r.message:'✅ 비밀번호 변경 완료');
    document.getElementById('pwChange').classList.remove('on');
    // 변경된 비번으로 다시 로그인
    api({action:'getStudentScore',id:st.id,pw:p1},function(r2){
      if(r2&&r2.name){ onLoginSuccess({role:'student',name:r2.name,id:st.id,pw:p1,sd:r2}); }
    });
  });
}
function onLoginSuccess(u){
  G.user=u;
  document.getElementById('LS').style.display='none';
  document.getElementById('APP').classList.add('on');
  var pfx={admin:'🔑 ',teacher:'👩‍🏫 ',student:'🎒 '}[u.role]||'';
  document.getElementById('ubadge').textContent=pfx+u.name;
  buildNav();
  if(u.role==='teacher'){
    document.getElementById('tId').value=u.id;
    document.getElementById('tPw').value=u.pw;
    document.getElementById('taArea').classList.remove('hidden');
    loadStudents(); buildItems(); applyLayout();
  } else if(u.role==='admin'){
    document.getElementById('taArea').classList.add('hidden');
    loadStudents(); buildItems(); applyLayout();
    loadDash(); loadEditRecords();
  } else {
    document.getElementById('taArea').classList.add('hidden');
    renderScore(u.sd);
  }
}
function doLogout(){
  G.user=null; G.students=[]; G.picked=null; G.pickedV=null;
  G.histList=[]; G.editList=[]; G.adminData=null; G.clsStudents=[];
  document.getElementById('APP').classList.remove('on');
  document.getElementById('APP').style.display='';
  document.getElementById('LS').style.display='flex';
  document.getElementById('lid').value=''; document.getElementById('lpw').value='';
}

// ════════════════════════════════════════
// 네비게이션 (상단 탭바 + 사이드바 동기화)
// ════════════════════════════════════════
var NAVS={
  admin:  [{id:'vDash',ic:'📊',lb:'통계'},{id:'vEdit',ic:'✏️',lb:'수정'},{id:'vInput',ic:'➕',lb:'입력'}],
  teacher:[{id:'vInput',ic:'✏️',lb:'입력'},{id:'vHist',ic:'📋',lb:'기록'},{id:'vClass',ic:'🔑',lb:'비번관리'}],
  student:[{id:'vScore',ic:'🏆',lb:'내 점수'}]
};
function buildNav(){
  var items=NAVS[G.user.role]||[];
  function mkBtn(n){
    return '<button class="titem" data-view="'+n.id+'" onclick="switchView(\''+n.id+'\',this)">'+n.ic+' '+n.lb+'</button>';
  }
  var html=items.map(mkBtn).join('');
  document.getElementById('topNav').innerHTML=html;
  document.getElementById('sideNav').innerHTML=html;
  // 첫 뷰
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');});
  if(items.length){
    var fv=document.getElementById(items[0].id);
    if(fv)fv.classList.add('on');
    document.querySelectorAll('[data-view="'+items[0].id+'"]').forEach(function(b){b.classList.add('on');});
  }
}
function switchView(id,el){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');});
  var v=document.getElementById(id); if(v)v.classList.add('on');
  document.querySelectorAll('.titem').forEach(function(b){
    b.classList.toggle('on',b.getAttribute('data-view')===id);
  });
  if(id==='vHist')loadHist();
  if(id==='vDash'&&!G.adminData)loadDash();
  if(id==='vEdit'&&!G.editList.length)loadEditRecords();
  if(id==='vClass')loadClassStudents();
}

// ════════════════════════════════════════
// 레이아웃 적용 (모바일/데스크톱)
// ════════════════════════════════════════
function applyLayout(){
  var mob=G.isMobile;
  document.getElementById('mobileItems').style.display=mob?'':'none';
  document.getElementById('deskR').style.display=mob?'none':'';
  document.getElementById('deskP').style.display=mob?'none':'';
  if(!mob){ buildFlatItems('dR',CONFIG.REWARD_ITEMS,'r'); buildFlatItems('dP',CONFIG.PENALTY_ITEMS,'p'); }
}

// ════════════════════════════════════════
// 학생 목록
// ════════════════════════════════════════
function renderStudents(arr){
  var el=document.getElementById('slist');
  if(!arr||!arr.length){el.innerHTML='<div class="empty"><span class="ei">👥</span>학생 없음</div>';return;}
  el.innerHTML=arr.map(function(s){
    return '<div class="sit" onclick="toggleS(this)">'+
      '<input type="checkbox" class="schk" value="'+s.id+'" data-name="'+s.name+'" onclick="event.stopPropagation()">'+
      '<div><div class="sn">'+s.name+'</div><div class="si2">'+s.id+'</div></div></div>';
  }).join('');
}
function filterS(){
  var v=document.getElementById('ssearch').value.toLowerCase();
  renderStudents(G.students.filter(function(s){return s.id.includes(v)||s.name.includes(v);}));
}
function toggleS(el){var c=el.querySelector('.schk');c.checked=!c.checked;updateSum();}

// ════════════════════════════════════════
// 항목 버튼
// ════════════════════════════════════════
function switchTab(t){
  G.curTab=t;
  var tabR=document.getElementById('tabR'), tabP=document.getElementById('tabP');
  tabR.className=t==='r'?'ar':'';
  tabP.className=t==='p'?'ap':'';
  document.getElementById('panR').classList.toggle('on',t==='r');
  document.getElementById('panP').classList.toggle('on',t==='p');
}
function buildItems(){
  // 모바일: 단일 flat 리스트 (구분 없이 전부)
  buildFlatItems('panR',CONFIG.REWARD_ITEMS,'r');
  buildFlatItems('panP',CONFIG.PENALTY_ITEMS,'p');
  // 데스크톱은 applyLayout 에서 처리
}
function buildFlatItems(cid,items,type){
  var el=document.getElementById(cid); if(!el)return;
  el.innerHTML=items.map(function(item){
    var v=item.value.replace(/'/g,"\\'");
    var lb=item.limit?'<span class="lb">월'+item.limit+'점</span>':'';
    return '<button class="ib" onclick="pickItem(this,\''+v+'\','+item.score+',\''+type+'\')" data-v="'+v+'">'+
      '<span>'+item.label+lb+'</span>'+
      '<span class="sc '+(item.score>0?'pos':'neg')+'">'+(item.score>0?'+':'')+item.score+'</span>'+
      '</button>';
  }).join('');
}
function pickItem(btn,v,sc,type){
  document.querySelectorAll('.ib').forEach(function(b){b.classList.remove('sr','sp');});
  if(G.pickedV===v){ G.picked=null; G.pickedV=null; updateSum(); return; }
  G.pickedV=v; G.picked={value:v,score:sc,type:type};
  document.querySelectorAll('.ib[data-v="'+v.replace(/'/g,"\\'")+'"').forEach(function(b){
    b.classList.add(type==='r'?'sr':'sp');
  });
  updateSum();
}
function updateSum(){
  var cnt=document.querySelectorAll('.schk:checked').length;
  var sc=G.picked?G.picked.score:0;
  var se=document.getElementById('ssc'), te=document.getElementById('stxt');
  if(!cnt||!G.picked){te.textContent='학생·항목을 선택하세요';se.textContent='0점';se.style.color='#94a3b8';return;}
  te.textContent=cnt+'명 × '+G.picked.value;
  se.textContent=(sc>0?'+':'')+sc+'점';
  se.style.color=sc>0?'#16a34a':'#dc2626';
}

// ════════════════════════════════════════
// 저장
// ════════════════════════════════════════
function saveRec(){
  var tId=document.getElementById('tId').value.trim();
  var tPw=document.getElementById('tPw').value.trim();
  var chks=document.querySelectorAll('.schk:checked');
  if(G.user.role!=='admin'&&(!tId||!tPw)){toast('교사 ID/PW를 입력하세요');return;}
  if(!chks.length){toast('학생을 선택하세요');return;}
  if(!G.picked){toast('항목을 선택하세요');return;}
  var btn=document.getElementById('bsv');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>처리 중…';
  api({action:'saveBatchData',teacherId:tId||CONFIG.ADMIN_ID,teacherPw:tPw||CONFIG.ADMIN_PW,
    reason:G.picked.value,score:G.picked.score,
    students:Array.from(chks).map(function(c){return{id:c.value,name:c.dataset.name};})
  },function(r){
    btn.disabled=false; btn.textContent='💾 기록하기';
    toast(r&&r.message?r.message:String(r));
    document.querySelectorAll('.schk:checked').forEach(function(c){c.checked=false;});
    document.querySelectorAll('.ib').forEach(function(b){b.classList.remove('sr','sp');});
    G.picked=null; G.pickedV=null;
    document.getElementById('ssearch').value='';
    renderStudents(G.students); updateSum();
  });
}

// ════════════════════════════════════════
// 기록 조회
// ════════════════════════════════════════
function loadHist(){
  var tId=document.getElementById('tId').value.trim();
  var tPw=document.getElementById('tPw').value.trim();
  if(G.user.role==='teacher'&&(!tId||!tPw)){
    document.getElementById('hlist').innerHTML='<div class="empty"><span class="ei">🔑</span>교사 정보를 입력하세요</div>';return;
  }
  document.getElementById('hlist').innerHTML='<div class="empty"><span class="ei">⏳</span>불러오는 중…</div>';
  api({action:'getTeacherHistory',teacherId:tId||CONFIG.ADMIN_ID,teacherPw:tPw||CONFIG.ADMIN_PW},function(r){
    if(r&&r.error){toast('❌ '+r.error);return;}
    G.histList=(r&&r.history)?r.history:[];
    renderHist();
  });
}
function fHist(f,el){
  G.histF=f;
  document.querySelectorAll('#vHist .tb').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on'); renderHist();
}
function renderHist(){
  var el=document.getElementById('hlist');
  var list=G.histList;
  if(G.histF==='r')list=list.filter(function(h){return h.score>0;});
  if(G.histF==='p')list=list.filter(function(h){return h.score<0;});
  if(!list.length){el.innerHTML='<div class="empty"><span class="ei">📭</span>기록 없음</div>';return;}
  el.innerHTML=list.map(function(h){
    return '<div class="ri">'+
      '<div><div class="ln">'+h.studentName+' <span style="color:#94a3b8;font-size:.64rem">('+h.studentId+')</span></div>'+
      '<div class="lm">'+h.date+' · '+h.reason+'</div></div>'+
      '<div class="rr"><div class="rsc '+(h.score>0?'pos':'neg')+'">'+(h.score>0?'+':'')+h.score+'점</div>'+
      '<button class="bdel" onclick="delRec('+h.rowIndex+',\''+h.studentName.replace(/'/g,"\\'")+'\')">취소</button></div>'+
      '</div>';
  }).join('');
}
function delRec(rowIndex,nm){
  if(!confirm('['+nm+'] 기록을 취소하시겠습니까?'))return;
  var tId=document.getElementById('tId').value.trim();
  var tPw=document.getElementById('tPw').value.trim();
  api({action:'deleteRecord',rowIndex:rowIndex,teacherId:tId||CONFIG.ADMIN_ID,teacherPw:tPw||CONFIG.ADMIN_PW},function(r){
    toast(r&&r.message?r.message:String(r)); loadHist();
  });
}

// ════════════════════════════════════════
// 학생 점수
// ════════════════════════════════════════
function searchStu(){
  var sid=document.getElementById('ssid').value.trim();
  var spw=document.getElementById('sspw').value.trim();
  if(!sid||!spw){toast('학번과 비밀번호를 입력하세요');return;}
  api({action:'getStudentScore',id:sid,pw:spw},function(r){
    if(r&&r.mustChangePw){
      G.pendingStudent={id:sid,name:r.name};
      document.getElementById('lpw').value=spw;
      document.getElementById('pwChange').classList.add('on'); return;
    }
    if(r&&r.error){toast('❌ '+r.error);return;}
    renderScore(r);
  });
}
function renderScore(data){
  if(!data)return;
  var h=data.history||[];
  var rows=h.length?h.map(function(x){
    return '<div class="srow">'+
      '<span class="sd">'+x.date+'</span><span class="sr">'+x.reason+'</span>'+
      '<span class="ss2 rsc '+(parseFloat(x.score)>=0?'pos':'neg')+'">'+x.score+'</span>'+
      '<span class="ste">'+(x.teacherName||'')+'</span></div>';
  }).join(''):'<div class="empty"><span class="ei">📭</span>기록 없음</div>';
  document.getElementById('scoreWrap').innerHTML=
    '<div class="shero"><div class="hn">'+data.name+' 학생</div>'+
    '<div class="hs">'+data.total+'점</div><div class="hl">누적 드림포인트</div></div>'+
    '<div class="card"><div class="ctit">상세 내역</div>'+rows+'</div>';
}

// ════════════════════════════════════════
// 관리자 통계
// ════════════════════════════════════════
function loadDash(){
  api({action:'getAdminStats',adminId:CONFIG.ADMIN_ID,adminPw:CONFIG.ADMIN_PW},function(r){
    if(r&&r.error){toast('❌ '+r.error);return;}
    G.adminData=r;
    document.getElementById('stTotal').textContent=r.totalCount||0;
    document.getElementById('stR').textContent=r.totalReward||0;
    document.getElementById('stP').textContent=Math.abs(r.totalPenalty||0);
    document.getElementById('stS').textContent=r.studentCount||0;
    var ms=document.getElementById('fMonth');
    if(ms.options.length<=1){
      Object.keys(r.monthlyRanks||{}).sort().reverse().forEach(function(ym){
        var o=document.createElement('option');o.value=ym;o.textContent=ym;ms.appendChild(o);
      });
    }
    renderRank();
  });
}
function onGradeChange(){
  var g=document.getElementById('fGrade').value;
  var fc=document.getElementById('fClass');
  fc.innerHTML='<option value="">전 반</option>';
  if(g&&G.adminData){
    var cs={};
    (G.adminData.topStudents||[]).forEach(function(s){if(String(s.grade)===g)cs[String(s.cls)]=1;});
    Object.keys(cs).sort().forEach(function(c){
      var o=document.createElement('option');o.value=c;o.textContent=c+'반';fc.appendChild(o);
    });
  }
  renderRank();
}
function renderRank(){
  if(!G.adminData)return;
  var mon=document.getElementById('fMonth').value;
  var grade=document.getElementById('fGrade').value;
  var cls=document.getElementById('fClass').value;
  var list=mon?(G.adminData.monthlyRanks[mon]||[]):(G.adminData.topStudents||[]);
  if(grade)list=list.filter(function(s){return String(s.grade)===grade;});
  if(cls)list=list.filter(function(s){return String(s.cls)===cls;});
  var el=document.getElementById('rankList');
  if(!list.length){el.innerHTML='<div class="empty"><span class="ei">📊</span>데이터 없음</div>';return;}
  el.innerHTML=list.slice(0,20).map(function(s,i){
    return '<div class="rk"><div class="rn '+(i===0?'g':i===1?'s':i===2?'b':'')+'">'+
      (i+1)+'</div><div class="rnm">'+s.name+' <span style="color:#94a3b8;font-size:.64rem">('+s.id+')</span></div>'+
      '<div class="rsc2">'+s.total+'점</div></div>';
  }).join('');
}

// ════════════════════════════════════════
// 관리자 기록 수정
// ════════════════════════════════════════
function loadEditRecords(){
  document.getElementById('elist').innerHTML='<div class="empty"><span class="ei">⏳</span>불러오는 중…</div>';
  api({action:'getAdminRecords',adminId:CONFIG.ADMIN_ID,adminPw:CONFIG.ADMIN_PW},function(r){
    if(r&&r.error){toast('❌ '+r.error);return;}
    G.editList=(r&&r.records)?r.records:[];
    renderEdit();
  });
}
function fEdit(f,el){
  G.editF=f;
  document.querySelectorAll('#vEdit .tb').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on'); renderEdit();
}
function renderEdit(){
  var el=document.getElementById('elist');
  var q=document.getElementById('esearch').value.toLowerCase();
  var list=G.editList;
  if(G.editF==='r')list=list.filter(function(h){return h.score>0;});
  if(G.editF==='p')list=list.filter(function(h){return h.score<0;});
  if(q)list=list.filter(function(h){return h.studentName.includes(q)||h.studentId.includes(q);});
  if(!list.length){el.innerHTML='<div class="empty"><span class="ei">📭</span>기록 없음</div>';return;}
  el.innerHTML=list.slice(0,100).map(function(h){
    var reason=h.reason.replace(/'/g,"\\'");
    return '<div class="ri">'+
      '<div><div class="ln">'+h.studentName+' <span style="color:#94a3b8;font-size:.64rem">('+h.studentId+')</span></div>'+
      '<div class="lm">'+h.date+' · '+h.reason+' · '+h.teacherId+'</div></div>'+
      '<div class="rr"><div class="rsc '+(h.score>0?'pos':'neg')+'">'+(h.score>0?'+':'')+h.score+'점</div>'+
      '<button class="bedit" onclick="openModal('+h.rowIndex+',\''+reason+'\','+h.score+')">수정</button>'+
      '<button class="bdel" onclick="adminDel('+h.rowIndex+')">삭제</button></div>'+
      '</div>';
  }).join('');
}
function adminDel(rowIndex){
  if(!confirm('이 기록을 삭제하시겠습니까?'))return;
  api({action:'deleteRecord',rowIndex:rowIndex,teacherId:CONFIG.ADMIN_ID,teacherPw:CONFIG.ADMIN_PW},function(r){
    toast(r&&r.message?r.message:String(r));
    G.editList=G.editList.filter(function(x){return x.rowIndex!==rowIndex;});
    G.adminData=null; renderEdit();
  });
}
function openModal(rowIndex,reason,score){
  G.editRow=rowIndex;
  var sel=document.getElementById('mReason');
  sel.innerHTML=CONFIG.REWARD_ITEMS.concat(CONFIG.PENALTY_ITEMS).map(function(i){
    return '<option value="'+i.value+'"'+(i.value===reason?' selected':'')+'>'+i.label+'</option>';
  }).join('');
  document.getElementById('mScore').value=score;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){document.getElementById('modal').classList.remove('on');G.editRow=null;}
function submitEdit(){
  if(!G.editRow)return;
  var reason=document.getElementById('mReason').value;
  var score=parseFloat(document.getElementById('mScore').value);
  if(isNaN(score)){toast('점수를 입력하세요');return;}
  api({action:'editRecord',rowIndex:G.editRow,reason:reason,score:score},function(r){
    toast(r&&r.message?r.message:String(r));
    closeModal(); G.editList=[]; G.adminData=null; loadEditRecords();
  });
}

// ════════════════════════════════════════
// 담임 비밀번호 관리
// ════════════════════════════════════════
function loadClassStudents(){
  var tId=document.getElementById('tId').value.trim();
  var tPw=document.getElementById('tPw').value.trim();
  document.getElementById('clsList').innerHTML='<div class="empty"><span class="ei">⏳</span>불러오는 중…</div>';
  api({action:'getMyClassStudents',teacherId:tId,teacherPw:tPw},function(r){
    if(r&&r.error){toast('❌ '+r.error);return;}
    G.clsStudents=(r&&r.students)?r.students:[];
    renderClassStudents();
  });
}
function renderClassStudents(){
  var el=document.getElementById('clsList');
  if(!G.clsStudents.length){el.innerHTML='<div class="empty"><span class="ei">👥</span>학생 없음</div>';return;}
  el.innerHTML='<div class="card">'+G.clsStudents.map(function(s){
    var flag=s.mustChange?'<span class="flag-badge">변경대기</span>':'';
    var sid=s.id.replace(/'/g,"\\'"), snm=s.name.replace(/'/g,"\\'");
    return '<div class="cls-row">'+
      '<div><div class="cn">'+s.name+flag+'</div><div class="ci">'+s.id+'</div></div>'+
      '<div class="ca">'+
      '<button class="breset" onclick="resetPw(\''+sid+'\',\''+snm+'\')">초기화</button>'+
      '<button class="bchpw" onclick="changePw(\''+sid+'\',\''+snm+'\')">변경</button>'+
      '</div></div>';
  }).join('')+'</div>';
}
function resetPw(sid,nm){
  if(!confirm('['+nm+'] 비밀번호를 0000으로 초기화하고\n다음 로그인 시 변경을 강제합니까?'))return;
  var tId=document.getElementById('tId').value.trim();
  var tPw=document.getElementById('tPw').value.trim();
  api({action:'changeStudentPw',teacherId:tId,teacherPw:tPw,studentId:sid,newPw:'0000',mustChange:true},function(r){
    toast(r&&r.message?r.message:(r&&r.error?'❌ '+r.error:String(r)));
    loadClassStudents();
  });
}
function changePw(sid,nm){
  var np=prompt('['+nm+'] 새 비밀번호를 입력하세요 (4자 이상):');
  if(!np||np.length<4){toast('4자 이상 입력해주세요');return;}
  var tId=document.getElementById('tId').value.trim();
  var tPw=document.getElementById('tPw').value.trim();
  api({action:'changeStudentPw',teacherId:tId,teacherPw:tPw,studentId:sid,newPw:np,mustChange:false},function(r){
    toast(r&&r.message?r.message:(r&&r.error?'❌ '+r.error:String(r)));
    loadClassStudents();
  });
}

// ════════════════════════════════════════
// 토스트
// ════════════════════════════════════════
var toastTimer=null;
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove('on');},3000);
}
</script>
