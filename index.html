<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>드림포인트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
:root{
  --p:#2563eb;--s:#0ea5e9;--ok:#16a34a;--ng:#dc2626;
  --bg:#f0f4ff;--card:#fff;--tx:#1e293b;--mu:#64748b;--bd:#e2e8f0;
  --r:13px;--sh:0 2px 12px rgba(37,99,235,.07);
  --nh:58px;--sb:env(safe-area-inset-bottom,0px);--sw:200px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;touch-action:manipulation}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}

/* ── 로그인 ── */
#LS{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1e40af,#0ea5e9)}
.lbox{background:#fff;border-radius:22px;padding:34px 26px;width:100%;max-width:370px;box-shadow:0 20px 60px rgba(0,0,0,.22);animation:fu .35s ease}
.llogo{text-align:center;margin-bottom:22px;cursor:pointer;-webkit-user-select:none;user-select:none}
.llogo .ico{font-size:2.4rem;display:block;margin-bottom:5px}
.llogo h1{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--p)}
.llogo p{font-size:.76rem;color:var(--mu);margin-top:2px}
.rtabs{display:flex;gap:4px;background:var(--bg);border-radius:11px;padding:4px;margin-bottom:16px}
.rtab{flex:1;padding:9px 4px;text-align:center;border-radius:8px;font-size:.77rem;font-weight:700;cursor:pointer;color:var(--mu);border:none;background:transparent;font-family:inherit;transition:all .18s}
.rtab.on{background:#fff;color:var(--p);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.fg{margin-bottom:12px}
.fg label{font-size:.74rem;font-weight:700;color:var(--mu);display:block;margin-bottom:4px}
.fg input{width:100%;height:46px;border:1.5px solid var(--bd);border-radius:9px;padding:0 13px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s}
.fg input:focus{border-color:var(--p)}
.bpri{width:100%;height:50px;background:var(--p);color:#fff;border:none;border-radius:11px;font-size:.97rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s}
.bpri:active{transform:scale(.98);opacity:.9}
#adminBtn{display:none;width:100%;padding:10px;margin-bottom:12px;background:#fff3f3;color:#dc2626;border:1.5px solid #fecaca;border-radius:9px;font-size:.8rem;font-weight:700;font-family:inherit;cursor:pointer}

/* ── 앱 레이아웃 ── */
#APP{display:none;min-height:100vh}
.hdr{background:#fff;border-bottom:1px solid var(--bd);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.hdr .lg{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--p)}
.hdr-r{display:flex;align-items:center;gap:7px}
.ubadge{background:var(--bg);border-radius:18px;padding:4px 10px;font-size:.7rem;font-weight:700;color:var(--p);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blg{background:none;border:1.5px solid var(--bd);border-radius:7px;padding:4px 9px;font-size:.68rem;font-weight:700;color:var(--mu);cursor:pointer;font-family:inherit}

/* 모바일: 하단 탭 */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bd);display:flex;z-index:200;box-shadow:0 -2px 10px rgba(0,0,0,.05);padding-bottom:var(--sb)}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px;font-size:.6rem;font-weight:700;color:var(--mu);cursor:pointer;border:none;background:none;font-family:inherit;gap:2px;min-height:var(--nh);transition:color .12s}
.nitem .ni{font-size:1.25rem;line-height:1}
.nitem.on{color:var(--p)}

/* 데스크톱: 사이드바 + 콘텐츠 */
.abody{display:block}
.sidebar{display:none}
.mc{padding:14px 13px calc(var(--nh) + var(--sb) + 12px);max-width:600px;margin:0 auto}

@media(min-width:768px){
  .bnav{display:none}
  .abody{display:flex;min-height:calc(100vh - 52px)}
  .sidebar{display:flex;flex-direction:column;width:var(--sw);background:#fff;border-right:1px solid var(--bd);padding:16px 10px;gap:3px;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
  .sidebar .nitem{flex-direction:row;justify-content:flex-start;padding:10px 13px;border-radius:9px;font-size:.83rem;min-height:auto;gap:9px}
  .sidebar .nitem .ni{font-size:1.05rem}
  .sidebar .nitem.on{background:var(--bg)}
  .sidebar .nitem:hover{background:var(--bg)}
  .mc{padding:20px 22px;max-width:none;flex:1;margin:0}
  /* 입력: 2컬럼 */
  .inp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
  .inp-full{grid-column:1/-1}
  .student-list{max-height:calc(100vh - 300px)!important}
  /* 항목: 데스크톱 좌우 */
  .mtabs{display:none!important}
  .mpanel{display:block!important}
  .desk-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .col-head{font-size:.74rem;font-weight:800;padding:7px 10px;border-radius:7px;margin-bottom:7px;text-align:center}
  .col-head.cr{background:#f0fdf4;color:var(--ok)}
  .col-head.cp{background:#fff1f2;color:var(--ng)}
}

/* ── 공통 컴포넌트 ── */
.view{display:none;animation:fu .22s ease}
.view.on{display:block}
.stitle{font-size:1rem;font-weight:900;color:var(--tx);margin-bottom:12px;margin-top:1px}
.card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:11px;box-shadow:var(--sh)}
.ctitle{font-size:.71rem;font-weight:700;color:var(--mu);margin-bottom:9px;letter-spacing:.3px;text-transform:uppercase}

/* 통계 박스 */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
@media(max-width:500px){.sgrid{grid-template-columns:1fr 1fr}}
.sbox{background:var(--card);border-radius:var(--r);padding:13px 8px;box-shadow:var(--sh);text-align:center}
.sbox .sl{font-size:.66rem;font-weight:700;color:var(--mu);margin-bottom:2px}
.sbox .sv{font-size:1.35rem;font-weight:900;color:var(--p)}
.sbox.g .sv{color:var(--ok)}  .sbox.r .sv{color:var(--ng)}

/* 검색 */
.si{width:100%;height:42px;border:1.5px solid var(--bd);border-radius:9px;padding:0 12px;font-size:16px;font-family:inherit;outline:none;margin-bottom:6px;transition:border-color .15s}
.si:focus{border-color:var(--p)}
.student-list{max-height:210px;overflow-y:auto;border:1px solid var(--bd);border-radius:9px;background:#fafbff;-webkit-overflow-scrolling:touch}
.sitem{display:flex;align-items:center;padding:10px 11px;border-bottom:1px solid #f1f5f9;cursor:pointer;gap:9px}
.sitem:last-child{border-bottom:none}
.sitem:active,.sitem:hover{background:#eff6ff}
.sitem input[type=checkbox]{width:18px;height:18px;accent-color:var(--p);flex-shrink:0}
.sitem .sid{font-size:.67rem;color:var(--mu)}
.sitem .snm{font-size:.86rem;font-weight:700}

/* 상벌점 탭 */
.mtabs{display:flex;border-radius:9px;overflow:hidden;border:1.5px solid var(--bd);margin-bottom:9px}
.mtab{flex:1;padding:10px;text-align:center;font-size:.84rem;font-weight:700;cursor:pointer;border:none;background:#f8fafc;color:var(--mu);font-family:inherit;transition:all .13s}
.mtab.ar{background:var(--ok);color:#fff}
.mtab.ap{background:var(--ng);color:#fff}
.mpanel{display:none}
.mpanel.on{display:block}

/* 아코디언 */
.ah{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:#f8fafc;border-radius:8px;cursor:pointer;margin-bottom:5px;border:1px solid var(--bd);-webkit-user-select:none;user-select:none}
.ah span{font-size:.75rem;font-weight:700;color:var(--mu)}
.aarr{font-size:.58rem;color:var(--mu);transition:transform .18s}
.ah.op .aarr{transform:rotate(180deg)}
.ab{display:none;margin-bottom:4px}
.ab.op{display:block}

/* 항목 버튼 — 터치 최적화 */
.ibtn{display:flex;align-items:center;justify-content:space-between;padding:12px 12px;border:1.5px solid var(--bd);border-radius:9px;margin-bottom:5px;cursor:pointer;background:#fff;font-family:inherit;font-size:.81rem;color:var(--tx);width:100%;text-align:left;transition:border-color .1s,background .1s;-webkit-tap-highlight-color:transparent;min-height:44px}
.ibtn:active{opacity:.75}
.ibtn:hover{border-color:#94a3b8}
.ibtn.sr{border-color:var(--ok);background:#f0fdf4}
.ibtn.sp{border-color:var(--ng);background:#fff1f2}
.ibtn .sc{font-size:.81rem;font-weight:900;min-width:30px;text-align:right;flex-shrink:0}
.sc.pos{color:var(--ok)} .sc.neg{color:var(--ng)}
.lbadge{font-size:.57rem;background:#fef3c7;color:#92400e;border-radius:3px;padding:1px 4px;margin-left:4px;font-weight:700;vertical-align:middle;white-space:nowrap}

/* 요약바 */
.sumbar{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:9px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.sumbar .st{font-size:.78rem;font-weight:700;color:var(--p)}
.sumbar .ss{font-size:1rem;font-weight:900}
.bsave{width:100%;height:50px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border:none;border-radius:11px;font-size:.97rem;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(37,99,235,.25);transition:opacity .15s,transform .1s}
.bsave:active{transform:scale(.98);opacity:.9}
.bsave:disabled{opacity:.48;cursor:not-allowed}

/* 기록 */
.tfil{display:flex;gap:5px;margin-bottom:9px}
.tbtn{padding:5px 13px;border-radius:18px;border:1.5px solid var(--bd);background:#fff;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;color:var(--mu);transition:all .1s}
.tbtn.on{background:var(--p);border-color:var(--p);color:#fff}
.ritem{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:9px;margin-bottom:6px;background:#fafbff;border:1px solid var(--bd)}
.ritem .ri .rn{font-size:.86rem;font-weight:700}
.ritem .ri .rm{font-size:.68rem;color:var(--mu);margin-top:2px}
.ritem .rr{text-align:right;flex-shrink:0;margin-left:8px}
.rsc{font-size:.92rem;font-weight:900}
.rsc.pos{color:var(--ok)} .rsc.neg{color:var(--ng)}
.bdel{font-size:.65rem;padding:3px 8px;border-radius:5px;border:1px solid var(--ng);color:var(--ng);background:none;cursor:pointer;font-family:inherit;margin-top:4px}
.bedit{font-size:.65rem;padding:3px 8px;border-radius:5px;border:1px solid var(--p);color:var(--p);background:none;cursor:pointer;font-family:inherit;margin-top:4px;margin-right:4px}

/* 학생 점수 */
.shero{background:linear-gradient(135deg,#1e40af,#0ea5e9);border-radius:16px;padding:26px 18px;text-align:center;color:#fff;margin-bottom:11px}
.shero .hn{font-size:.86rem;opacity:.8;margin-bottom:3px}
.shero .hs{font-family:'Syne',sans-serif;font-size:2.8rem;font-weight:800}
.shero .hl{font-size:.72rem;opacity:.6;margin-top:1px}
.srow{display:flex;padding:9px 11px;border-bottom:1px solid #f1f5f9;font-size:.8rem;gap:6px}
.srow:last-child{border-bottom:none}
.srow .sd{color:var(--mu);font-size:.7rem;flex-shrink:0;min-width:42px}
.srow .sr2{flex:1}
.srow .st2{font-weight:700;flex-shrink:0;min-width:36px;text-align:right}
.srow .steacher{font-size:.66rem;color:var(--mu);flex-shrink:0;min-width:50px;text-align:right}

/* 랭킹 */
.rnk{display:flex;align-items:center;padding:9px 11px;border-bottom:1px solid #f1f5f9;gap:9px}
.rnum{width:22px;height:22px;border-radius:50%;background:var(--bg);font-size:.7rem;font-weight:900;display:flex;align-items:center;justify-content:center;color:var(--mu);flex-shrink:0}
.rnum.g{background:#fef3c7;color:#d97706}
.rnum.s{background:#f1f5f9;color:#475569}
.rnum.b{background:#fff7ed;color:#c2410c}
.rnm{flex:1;font-size:.84rem;font-weight:700}
.rsc2{font-size:.88rem;font-weight:900;color:var(--p)}

/* 필터 셀렉트 */
.fsel{padding:6px 10px;border:1.5px solid var(--bd);border-radius:8px;font-size:.76rem;font-family:inherit;outline:none;background:#fff;color:var(--tx);cursor:pointer}

/* 수정 모달 */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:16px}
#modal.on{display:flex}
.mbox{background:#fff;border-radius:16px;padding:22px 20px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,.2);animation:fu .2s ease}
.mbox h3{font-size:.95rem;font-weight:800;margin-bottom:14px}
.mbox select,.mbox input{width:100%;height:42px;border:1.5px solid var(--bd);border-radius:8px;padding:0 10px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
.mbox select:focus,.mbox input:focus{border-color:var(--p)}
.mbtns{display:flex;gap:7px;margin-top:4px}
.mbtns button{flex:1;height:42px;border:none;border-radius:8px;font-weight:700;font-size:.85rem;cursor:pointer;font-family:inherit}
.mbtns .mok{background:var(--p);color:#fff}
.mbtns .mcancel{background:var(--bg);color:var(--mu)}

/* 교사 인증 */
.tauth{display:flex;gap:6px;margin-bottom:9px}
.tauth input{flex:1;height:40px;border:1.5px solid var(--bd);border-radius:9px;padding:0 10px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.tauth input:focus{border-color:var(--p)}

/* 유틸 */
.empty{text-align:center;padding:26px 14px;color:var(--mu);font-size:.8rem}
.empty .ei{font-size:2rem;display:block;margin-bottom:6px;opacity:.3}
.hidden{display:none!important}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .55s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes fu{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:calc(var(--nh) + var(--sb) + 9px);left:50%;transform:translateX(-50%) translateY(12px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:24px;font-size:.8rem;font-weight:700;opacity:0;transition:all .22s;pointer-events:none;white-space:pre-line;text-align:center;max-width:86vw;z-index:999}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:18px}}
</style>
</head>
<body>

<!-- ══ 로그인 ══ -->
<div id="LS">
  <div class="lbox">
    <div class="llogo" id="llogo" onclick="ltap()">
      <span class="ico">🏫</span>
      <h1 id="ltitle">드림포인트</h1>
      <p id="lsub">학생 상벌점 관리 시스템</p>
    </div>
    <div class="rtabs">
      <button class="rtab on" onclick="setRole('teacher')" id="tabT">👩‍🏫 교사</button>
      <button class="rtab" onclick="setRole('student')" id="tabS">🎒 학생</button>
    </div>
    <button id="adminBtn" onclick="setRole('admin')">🔑 관리자 모드 진입</button>
    <div class="fg"><label id="lbl">아이디</label><input type="text" id="lid" autocomplete="off" autocapitalize="none" placeholder="아이디 입력"></div>
    <div class="fg"><label>비밀번호</label><input type="password" id="lpw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="bpri" onclick="login()">로그인 →</button>
  </div>
</div>

<!-- ══ 앱 ══ -->
<div id="APP">
  <header class="hdr">
    <div class="lg">🏫 드림포인트</div>
    <div class="hdr-r">
      <div class="ubadge" id="ubadge"></div>
      <button class="blg" onclick="logout()">로그아웃</button>
    </div>
  </header>
  <div class="abody">
    <nav class="sidebar" id="snav"></nav>
    <main class="mc">

      <!-- 입력 뷰 -->
      <div class="view on" id="vInput">
        <p class="stitle">✏️ 상벌점 입력</p>
        <div id="taArea"><div class="card"><div class="ctitle">교사 인증</div>
          <div class="tauth"><input type="text" id="tId" placeholder="교사 ID" autocapitalize="none"><input type="password" id="tPw" placeholder="비밀번호"></div>
        </div></div>
        <div class="inp-grid">
          <div>
            <div class="card">
              <div class="ctitle">학생 선택</div>
              <input class="si" type="search" id="ssearch" placeholder="🔍 이름 또는 학번" oninput="filterS()">
              <div class="student-list" id="slist"><div class="empty"><span class="ei">⏳</span>로딩 중…</div></div>
            </div>
          </div>
          <div>
            <div class="card">
              <div class="mtabs">
                <button class="mtab ar" id="tabR" onclick="switchTab('r')">✅ 상점</button>
                <button class="mtab" id="tabP" onclick="switchTab('p')">❌ 벌점</button>
              </div>
              <div class="mpanel on" id="panR"></div>
              <div class="mpanel" id="panP"></div>
              <div class="desk-2col" id="d2col" style="display:none">
                <div><div class="col-head cr">✅ 상점</div><div id="dR"></div></div>
                <div><div class="col-head cp">❌ 벌점</div><div id="dP"></div></div>
              </div>
            </div>
          </div>
          <div class="inp-full">
            <div class="sumbar"><div class="st" id="stxt">학생·항목을 선택하세요</div><div class="ss" id="ssc" style="color:var(--mu)">0점</div></div>
            <button class="bsave" id="bsv" onclick="saveRec()">💾 기록하기</button>
          </div>
        </div>
      </div>

      <!-- 기록 뷰 -->
      <div class="view" id="vHist">
        <p class="stitle">📋 내 입력 기록</p>
        <div class="tfil">
          <button class="tbtn on" onclick="fHist('all',this)">전체</button>
          <button class="tbtn" onclick="fHist('r',this)">상점</button>
          <button class="tbtn" onclick="fHist('p',this)">벌점</button>
        </div>
        <div id="hlist"><div class="empty"><span class="ei">📭</span>기록 없음</div></div>
      </div>

      <!-- 학생 점수 뷰 -->
      <div class="view" id="vScore">
        <p class="stitle">🏆 나의 드림포인트</p>
        <div id="scoreWrap">
          <div class="card">
            <div class="ctitle">학번 & 비밀번호 조회</div>
            <div class="fg"><label>학번</label><input type="text" id="ssid" inputmode="numeric" placeholder="학번 입력"></div>
            <div class="fg"><label>비밀번호</label><input type="password" id="sspw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')searchStu()"></div>
            <button class="bsave" onclick="searchStu()">조회하기</button>
          </div>
        </div>
      </div>

      <!-- 관리자: 통계 -->
      <div class="view" id="vDash">
        <p class="stitle">📊 전체 현황</p>
        <div class="sgrid">
          <div class="sbox"><div class="sl">기록수</div><div class="sv" id="stTotal">-</div></div>
          <div class="sbox g"><div class="sl">상점합계</div><div class="sv" id="stR">-</div></div>
          <div class="sbox r"><div class="sl">벌점합계</div><div class="sv" id="stP">-</div></div>
          <div class="sbox"><div class="sl">참여학생</div><div class="sv" id="stS">-</div></div>
        </div>
        <!-- 월별/반별 필터 -->
        <div class="card">
          <div class="ctitle">🏆 순위 조회</div>
          <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
            <select class="fsel" id="fMonth" onchange="renderRank()"><option value="">전체 기간</option></select>
            <select class="fsel" id="fGrade" onchange="renderRank()"><option value="">전 학년</option><option>1</option><option>2</option><option>3</option></select>
            <select class="fsel" id="fClass" onchange="renderRank()"><option value="">전 반</option></select>
          </div>
          <div id="rankList"><div class="empty"><span class="ei">⏳</span>로딩 중…</div></div>
        </div>
      </div>

      <!-- 관리자: 기록 수정 -->
      <div class="view" id="vEdit">
        <p class="stitle">✏️ 상벌점 수정</p>
        <div class="tfil">
          <button class="tbtn on" onclick="fEdit('all',this)">전체</button>
          <button class="tbtn" onclick="fEdit('r',this)">상점</button>
          <button class="tbtn" onclick="fEdit('p',this)">벌점</button>
        </div>
        <div style="margin-bottom:9px"><input class="si" type="search" id="esearch" placeholder="🔍 학생 이름/학번 검색" oninput="filterEdit()" style="margin:0"></div>
        <div id="elist"><div class="empty"><span class="ei">⏳</span>로딩 중…</div></div>
      </div>

    </main>
  </div>
  <nav class="bnav" id="bnav"></nav>
</div>

<!-- 수정 모달 -->
<div id="modal">
  <div class="mbox">
    <h3>기록 수정</h3>
    <select id="mReason"></select>
    <input type="number" id="mScore" placeholder="점수 (양수=상점, 음수=벌점)">
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal()">취소</button>
      <button class="mok" onclick="submitEdit()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════ 상태 ════ */
let role='teacher', user=null;
let allS=[], allHist=[], histF='all';
window.selItem=null; window._picked=null;
let adminData=null, editRecords=[], editF='all', editRow=null;
let isMobile=true;

/* ════ 캐시 ════ */
const CK='dp_stu', CTL=30*60*1000;
let _sc=null;

/* ════ 레이아웃 감지 ════ */
function chkLayout(){ const was=isMobile; isMobile=window.innerWidth<768; if(was!==isMobile&&user) applyLayout(); }
window.addEventListener('resize',chkLayout); chkLayout();

/* ════ 테마 적용 ════ */
(function(){
  const t=CONFIG.THEME,r=document.documentElement.style;
  r.setProperty('--p',t.primary); r.setProperty('--s',t.secondary);
  r.setProperty('--ok',t.success); r.setProperty('--ng',t.danger);
  r.setProperty('--bg',t.bg); r.setProperty('--card',t.card);
  r.setProperty('--tx',t.text); r.setProperty('--mu',t.muted);
  document.getElementById('ltitle').textContent=CONFIG.SYSTEM_NAME;
  document.getElementById('lsub').textContent=CONFIG.SYSTEM_SUBTITLE;
})();

/* ════ 학생목록 프리로드 ════ */
(function(){
  try{ const r=localStorage.getItem(CK); if(r){const{ts,d}=JSON.parse(r);if(Date.now()-ts<CTL){_sc=d;return;}} }catch(e){}
  api({action:'getAllStudents'},r=>{if(r.students){_sc=r.students;try{localStorage.setItem(CK,JSON.stringify({ts:Date.now(),d:r.students}));}catch(e){}}});
})();

/* ════ JSONP ════ */
let _ci=0;
function api(payload,cb){
  const n='__cb'+(++_ci);
  window[n]=d=>{delete window[n];document.getElementById(n)?.remove();cb(d);};
  const s=document.createElement('script');
  s.id=n; s.src=CONFIG.API_URL+'?callback='+n+'&payload='+encodeURIComponent(JSON.stringify(payload));
  s.onerror=()=>{delete window[n];s.remove();toast('❌ 서버 연결 실패');};
  document.head.appendChild(s);
}

/* ════ 로그인 ════ */
let _lt=0,_ltimer=null;
function ltap(){
  _lt++; clearTimeout(_ltimer); _ltimer=setTimeout(()=>_lt=0,2000);
  if(_lt>=5){_lt=0;document.getElementById('adminBtn').style.display='block';toast('🔑 관리자 모드 활성화');}
}
function setRole(r){
  role=r;
  ['T','S'].forEach(x=>document.getElementById('tab'+x)?.classList.toggle('on',r===(x==='T'?'teacher':'student')));
  document.getElementById('lbl').textContent=r==='student'?'학번':'아이디';
}
function login(){
  const id=document.getElementById('lid').value.trim(), pw=document.getElementById('lpw').value.trim();
  if(!id||!pw)return toast('아이디와 비밀번호를 입력하세요');
  if(role==='admin'){
    if(id===CONFIG.ADMIN_ID&&pw===CONFIG.ADMIN_PW){ loginOK({role:'admin',name:'관리자',id}); }
    else { toast('❌ 관리자 인증 실패'); }
    return;
  }
  if(role==='teacher'){
    api({action:'authTeacher',teacherId:id,teacherPw:pw},r=>{
      if(r.success)loginOK({role:'teacher',name:r.name||id,id,pw});
      else toast('❌ '+(r.error||'교사 인증 실패'));
    }); return;
  }
  api({action:'getStudentScore',id,pw},r=>{
    if(r.error){toast('❌ '+r.error);return;}
    loginOK({role:'student',name:r.name,id,pw,sd:r});
  });
}
function loginOK(u){
  user=u;
  document.getElementById('LS').style.display='none';
  document.getElementById('APP').style.display='block';
  document.getElementById('ubadge').textContent=({admin:'🔑 ',teacher:'👩‍🏫 ',student:'🎒 '}[u.role])+u.name;
  chkLayout(); buildNav();
  // buildItems 먼저 → 그 다음 applyLayout (DOM 준비 후)
  if(u.role!=='student'){loadS();buildItems();}
  applyLayout();
  if(u.role==='teacher'){document.getElementById('tId').value=u.id;document.getElementById('tPw').value=u.pw;}
  if(u.role==='admin'){loadDash();loadEditRecords();}
  if(u.role==='student')renderScore(u.sd);
}
function logout(){
  user=null; allS=[]; window.selItem=null; window._picked=null;
  document.getElementById('APP').style.display='none';
  document.getElementById('LS').style.display='flex';
  document.getElementById('lid').value=''; document.getElementById('lpw').value='';
}

/* ════ 네비 ════ */
const NAVS={
  admin:[{id:'vDash',i:'📊',l:'통계'},{id:'vEdit',i:'✏️',l:'수정'},{id:'vInput',i:'➕',l:'입력'}],
  teacher:[{id:'vInput',i:'✏️',l:'입력'},{id:'vHist',i:'📋',l:'기록'}],
  student:[{id:'vScore',i:'🏆',l:'내 점수'}]
};
function buildNav(){
  const items=NAVS[user.role];
  const mk=items.map(n=>`<button class="nitem" onclick="sw('${n.id}',this)"><span class="ni">${n.i}</span>${n.l}</button>`).join('');
  document.getElementById('bnav').innerHTML=mk;
  document.getElementById('snav').innerHTML=mk;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById(items[0].id)?.classList.add('on');
  document.querySelectorAll('.nitem').forEach(b=>{if(b.getAttribute('onclick')?.includes(items[0].id))b.classList.add('on');});
  document.getElementById('taArea').classList.toggle('hidden',user.role==='student');
}
function sw(id,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById(id)?.classList.add('on');
  document.querySelectorAll('.nitem').forEach(b=>{b.classList.toggle('on',b.getAttribute('onclick')?.includes(id));});
  if(id==='vHist')loadHist();
  if(id==='vDash')loadDash();
  if(id==='vEdit')loadEditRecords();
}

/* ════ 레이아웃 ════ */
function applyLayout(){
  const d2=document.getElementById('d2col');
  const mtabs=document.querySelector('.mtabs');
  if(!d2)return;
  if(!isMobile){
    d2.style.display='grid';
    if(mtabs)mtabs.style.display='none';
    const pR=document.getElementById('panR'), pP=document.getElementById('panP');
    if(pR)pR.style.display='none';
    if(pP)pP.style.display='none';
    if(document.getElementById('dR'))buildAcc('dR',CONFIG.REWARD_ITEMS,'r');
    if(document.getElementById('dP'))buildAcc('dP',CONFIG.PENALTY_ITEMS,'p');
  } else {
    d2.style.display='none';
    if(mtabs)mtabs.style.display='';
    const pR=document.getElementById('panR'), pP=document.getElementById('panP');
    if(pR)pR.classList.toggle('on',curTab==='r');
    if(pP)pP.classList.toggle('on',curTab==='p');
  }
}

/* ════ 학생 목록 ════ */
function loadS(){
  if(_sc){allS=_sc;renderS(allS);return;}
  api({action:'getAllStudents'},r=>{
    if(r.students){allS=_sc=r.students;try{localStorage.setItem(CK,JSON.stringify({ts:Date.now(),d:r.students}));}catch(e){}renderS(allS);}
  });
}
function renderS(arr){
  const el=document.getElementById('slist');
  if(!arr.length){el.innerHTML='<div class="empty"><span class="ei">👥</span>학생 없음</div>';return;}
  el.innerHTML=arr.map(s=>`<div class="sitem" onclick="togS(this)">
    <input type="checkbox" class="schk" value="${s.id}" data-name="${s.name}" onclick="event.stopPropagation()">
    <div><div class="snm">${s.name}</div><div class="sid">${s.id}</div></div>
  </div>`).join('');
}
function filterS(){
  const v=document.getElementById('ssearch').value.toLowerCase();
  renderS(allS.filter(s=>s.id.includes(v)||s.name.includes(v)));
}
function togS(el){const c=el.querySelector('.schk');c.checked=!c.checked;updSum();}

/* ════ 항목 버튼 ════ */
let curTab='r';
function switchTab(t){
  curTab=t;
  document.getElementById('tabR').className='mtab'+(t==='r'?' ar':'');
  document.getElementById('tabP').className='mtab'+(t==='p'?' ap':'');
  document.getElementById('panR').classList.toggle('on',t==='r');
  document.getElementById('panP').classList.toggle('on',t==='p');
}
function buildItems(){
  buildAcc('panR',CONFIG.REWARD_ITEMS,'r');
  buildAcc('panP',CONFIG.PENALTY_ITEMS,'p');
  if(!isMobile){buildAcc('dR',CONFIG.REWARD_ITEMS,'r');buildAcc('dP',CONFIG.PENALTY_ITEMS,'p');}
}
function buildAcc(cid,items,type){
  const el=document.getElementById(cid); if(!el)return;
  const gen=items.filter(i=>!i.isHomeroom), hr=items.filter(i=>i.isHomeroom);
  el.innerHTML=mkAcc('일반 항목',gen,type,true)+(hr.length?mkAcc('담임 전용',hr,type,false):'');
}
function mkAcc(title,items,type,open){
  const btns=items.map(item=>{
    const lb=item.limit?`<span class="lbadge">월${item.limit}점</span>`:'';
    return `<button class="ibtn" onclick="pickItem(this,'${esc(item.value)}',${item.score},'${type}')" data-v="${esc(item.value)}">
      <span>${item.label}${lb}</span><span class="sc ${item.score>0?'pos':'neg'}">${item.score>0?'+'+item.score:item.score}</span>
    </button>`;
  }).join('');
  return `<div class="ah ${open?'op':''}" onclick="togAcc(this)"><span>${title} (${items.length})</span><span class="aarr">▼</span></div>
  <div class="ab ${open?'op':''}">${btns}</div>`;
}
function esc(s){return s.replace(/'/g,"\\'")}
function togAcc(h){h.classList.toggle('op');h.nextElementSibling.classList.toggle('op');}
function pickItem(btn,v,sc,type){
  document.querySelectorAll('.ibtn').forEach(b=>b.classList.remove('sr','sp'));
  if(window._picked===v){window._picked=null;window.selItem=null;updSum();return;}
  window._picked=v;
  document.querySelectorAll('.ibtn[data-v="'+esc(v)+'"]').forEach(b=>b.classList.add(type==='r'?'sr':'sp'));
  window.selItem={value:v,score:sc,type};
  updSum();
}
function updSum(){
  const cnt=document.querySelectorAll('.schk:checked').length, sc=window.selItem?.score||0;
  const se=document.getElementById('ssc'),te=document.getElementById('stxt');
  if(!cnt||!window.selItem){te.textContent='학생·항목을 선택하세요';se.textContent='0점';se.style.color='var(--mu)';return;}
  te.textContent=`${cnt}명 × ${window.selItem.value}`;
  se.textContent=(sc>0?'+':'')+sc+'점'; se.style.color=sc>0?'var(--ok)':'var(--ng)';
}

/* ════ 저장 ════ */
function saveRec(){
  const tId=document.getElementById('tId').value.trim(), tPw=document.getElementById('tPw').value.trim();
  const chks=document.querySelectorAll('.schk:checked');
  if(user.role!=='admin'&&(!tId||!tPw))return toast('교사 ID/PW를 입력하세요');
  if(!chks.length)return toast('학생을 선택하세요');
  if(!window.selItem)return toast('항목을 선택하세요');
  const btn=document.getElementById('bsv');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>처리 중…';
  api({action:'saveBatchData',teacherId:tId||CONFIG.ADMIN_ID,teacherPw:tPw||CONFIG.ADMIN_PW,
    reason:window.selItem.value,score:window.selItem.score,
    students:Array.from(chks).map(c=>({id:c.value,name:c.dataset.name}))
  },r=>{
    btn.disabled=false; btn.textContent='💾 기록하기';
    toast(r.message||String(r));
    document.querySelectorAll('.schk:checked').forEach(c=>c.checked=false);
    document.querySelectorAll('.ibtn').forEach(b=>b.classList.remove('sr','sp'));
    window.selItem=null; document.getElementById('ssearch').value=''; renderS(allS); updSum();
  });
}

/* ════ 교사 기록 조회 ════ */
function loadHist(){
  const tId=document.getElementById('tId').value.trim(), tPw=document.getElementById('tPw').value.trim();
  if(user.role==='teacher'&&(!tId||!tPw)){document.getElementById('hlist').innerHTML='<div class="empty"><span class="ei">🔑</span>교사 정보를 입력하세요</div>';return;}
  document.getElementById('hlist').innerHTML='<div class="empty"><span class="ei">⏳</span>불러오는 중…</div>';
  api({action:'getTeacherHistory',teacherId:tId||CONFIG.ADMIN_ID,teacherPw:tPw||CONFIG.ADMIN_PW},r=>{
    if(r.error){toast('❌ '+r.error);return;}
    allHist=r.history||[]; renderHist();
  });
}
function fHist(f,el){histF=f;document.querySelectorAll('#vHist .tbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');renderHist();}
function renderHist(){
  const el=document.getElementById('hlist');
  let list=allHist;
  if(histF==='r')list=list.filter(h=>h.score>0);
  if(histF==='p')list=list.filter(h=>h.score<0);
  if(!list.length){el.innerHTML='<div class="empty"><span class="ei">📭</span>기록 없음</div>';return;}
  el.innerHTML=list.map(h=>`<div class="ritem">
    <div class="ri"><div class="rn">${h.studentName} <span style="color:var(--mu);font-size:.67rem">(${h.studentId})</span></div>
    <div class="rm">${h.date} · ${h.reason}</div></div>
    <div class="rr"><div class="rsc ${h.score>0?'pos':'neg'}">${h.score>0?'+'+h.score:h.score}점</div>
    <button class="bdel" onclick="delRec(${h.rowIndex},'${h.studentName}')">취소</button></div>
  </div>`).join('');
}
function delRec(rowIndex,nm){
  if(!confirm(`[${nm}] 기록을 취소하시겠습니까?`))return;
  const tId=document.getElementById('tId').value.trim(), tPw=document.getElementById('tPw').value.trim();
  api({action:'deleteRecord',rowIndex,teacherId:tId||CONFIG.ADMIN_ID,teacherPw:tPw||CONFIG.ADMIN_PW},r=>{toast(r.message||String(r));loadHist();});
}

/* ════ 학생 점수 ════ */
function searchStu(){
  const sid=document.getElementById('ssid').value.trim(), spw=document.getElementById('sspw').value.trim();
  if(!sid||!spw)return toast('학번과 비밀번호를 입력하세요');
  api({action:'getStudentScore',id:sid,pw:spw},r=>{if(r.error){toast('❌ '+r.error);return;}renderScore(r);});
}
function renderScore(data){
  const h=data.history||[];
  document.getElementById('scoreWrap').innerHTML=`
    <div class="shero"><div class="hn">${data.name} 학생</div><div class="hs">${data.total}점</div><div class="hl">누적 드림포인트</div></div>
    <div class="card"><div class="ctitle">상세 내역</div>
    ${h.length?h.map(x=>`<div class="srow">
      <span class="sd">${x.date}</span><span class="sr2">${x.reason}</span>
      <span class="st2 ${parseFloat(x.score)>=0?'rsc pos':'rsc neg'}">${x.score}</span>
      <span class="steacher">${x.teacherName||''}</span>
    </div>`).join(''):'<div class="empty"><span class="ei">📭</span>기록 없음</div>'}
    </div>`;
}

/* ════ 관리자: 통계/순위 ════ */
function loadDash(){
  if(adminData){renderDash();return;}
  api({action:'getAdminStats',adminId:CONFIG.ADMIN_ID,adminPw:CONFIG.ADMIN_PW},r=>{
    if(r.error){toast('❌ '+r.error);return;}
    adminData=r; renderDash();
  });
}
function renderDash(){
  const r=adminData;
  document.getElementById('stTotal').textContent=r.totalCount||0;
  document.getElementById('stR').textContent=r.totalReward||0;
  document.getElementById('stP').textContent=Math.abs(r.totalPenalty||0);
  document.getElementById('stS').textContent=r.studentCount||0;
  // 월 셀렉트 채우기
  const ms=document.getElementById('fMonth');
  if(ms.options.length<=1){
    Object.keys(r.monthlyRanks||{}).sort().reverse().forEach(ym=>{
      const o=document.createElement('option'); o.value=ym; o.textContent=ym; ms.appendChild(o);
    });
  }
  renderRank();
}
function renderRank(){
  if(!adminData)return;
  const mon=document.getElementById('fMonth').value;
  const grade=document.getElementById('fGrade').value;
  const cls=document.getElementById('fClass').value;
  // 반 셀렉트 동적 업데이트
  const fCls=document.getElementById('fClass');
  if(grade){
    const clsSet=new Set();
    (adminData.topStudents||[]).forEach(s=>{if(String(s.grade)===grade)clsSet.add(String(s.cls));});
    const cur=fCls.value;
    fCls.innerHTML='<option value="">전 반</option>';
    Array.from(clsSet).sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c+'반';fCls.appendChild(o);});
    if(cur)fCls.value=cur;
  }
  let list=[];
  if(mon && adminData.monthlyRanks?.[mon]){
    list=adminData.monthlyRanks[mon];
  } else if(!mon){
    list=adminData.topStudents||[];
  }
  // 학년/반 필터
  if(grade)list=list.filter(s=>String(s.grade)===grade);
  if(cls)list=list.filter(s=>String(s.cls)===cls);
  if(!list.length){document.getElementById('rankList').innerHTML='<div class="empty"><span class="ei">📊</span>데이터 없음</div>';return;}
  document.getElementById('rankList').innerHTML=list.slice(0,20).map((s,i)=>`
    <div class="rnk">
      <div class="rnum ${i===0?'g':i===1?'s':i===2?'b':''}">${i+1}</div>
      <div class="rnm">${s.name} <span style="color:var(--mu);font-size:.67rem">(${s.id})</span></div>
      <div class="rsc2">${s.total}점</div>
    </div>`).join('');
}

/* ════ 관리자: 기록 수정 ════ */
function loadEditRecords(){
  if(editRecords.length){renderEdit();return;}
  document.getElementById('elist').innerHTML='<div class="empty"><span class="ei">⏳</span>불러오는 중…</div>';
  api({action:'getAdminRecords',adminId:CONFIG.ADMIN_ID,adminPw:CONFIG.ADMIN_PW},r=>{
    if(r.error){toast('❌ '+r.error);return;}
    editRecords=r.records||[]; renderEdit();
  });
}
function fEdit(f,el){editF=f;document.querySelectorAll('#vEdit .tbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');renderEdit();}
function filterEdit(){renderEdit();}
function renderEdit(){
  const el=document.getElementById('elist');
  const q=document.getElementById('esearch').value.toLowerCase();
  let list=editRecords;
  if(editF==='r')list=list.filter(h=>h.score>0);
  if(editF==='p')list=list.filter(h=>h.score<0);
  if(q)list=list.filter(h=>h.studentName.includes(q)||h.studentId.includes(q));
  if(!list.length){el.innerHTML='<div class="empty"><span class="ei">📭</span>기록 없음</div>';return;}
  el.innerHTML=list.slice(0,100).map(h=>`<div class="ritem">
    <div class="ri"><div class="rn">${h.studentName} <span style="color:var(--mu);font-size:.67rem">(${h.studentId})</span></div>
    <div class="rm">${h.date} · ${h.reason} · ${h.teacherId}</div></div>
    <div class="rr"><div class="rsc ${h.score>0?'pos':'neg'}">${h.score>0?'+'+h.score:h.score}점</div>
    <button class="bedit" onclick="openModal(${h.rowIndex},'${esc(h.reason)}',${h.score})">수정</button>
    <button class="bdel" onclick="adminDel(${h.rowIndex})">삭제</button></div>
  </div>`).join('');
}
function adminDel(rowIndex){
  if(!confirm('이 기록을 삭제하시겠습니까?'))return;
  api({action:'deleteRecord',rowIndex,teacherId:CONFIG.ADMIN_ID,teacherPw:CONFIG.ADMIN_PW},r=>{
    toast(r.message||String(r));
    editRecords=editRecords.filter(x=>x.rowIndex!==rowIndex);
    adminData=null; renderEdit();
  });
}

/* ════ 수정 모달 ════ */
function openModal(rowIndex,reason,score){
  editRow=rowIndex;
  // 항목 셀렉트 채우기
  const sel=document.getElementById('mReason');
  sel.innerHTML=[...CONFIG.REWARD_ITEMS,...CONFIG.PENALTY_ITEMS].map(i=>`<option value="${i.value}" ${i.value===reason?'selected':''}>${i.label}</option>`).join('');
  document.getElementById('mScore').value=score;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){document.getElementById('modal').classList.remove('on');editRow=null;}
function submitEdit(){
  if(!editRow)return;
  const reason=document.getElementById('mReason').value;
  const score=parseFloat(document.getElementById('mScore').value);
  if(isNaN(score))return toast('점수를 입력하세요');
  api({action:'editRecord',rowIndex:editRow,reason,score,adminId:CONFIG.ADMIN_ID,adminPw:CONFIG.ADMIN_PW},r=>{
    toast(r.message||String(r));
    closeModal(); editRecords=[]; adminData=null; loadEditRecords();
  });
}

/* ════ 토스트 ════ */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),3000);
}
</script>
</body>
</html>
