<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>드림포인트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4ff;color:#1e293b;min-height:100vh}

/* ───── 로그인 ───── */
#LS{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:linear-gradient(135deg,#1e40af,#0ea5e9)}
.lbox{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:360px;
      box-shadow:0 20px 60px rgba(0,0,0,.2);animation:up .3s ease}
.llogo{text-align:center;margin-bottom:20px;cursor:pointer;user-select:none}
.llogo .ico{font-size:2.4rem;display:block;margin-bottom:4px}
.llogo h1{font-size:1.4rem;font-weight:900;color:#2563eb}
.llogo p{font-size:.75rem;color:#64748b;margin-top:2px}
.rtabs{display:flex;gap:4px;background:#f0f4ff;border-radius:10px;padding:3px;margin-bottom:14px}
.rtab{flex:1;padding:9px 4px;text-align:center;border-radius:8px;font-size:.76rem;font-weight:700;
      color:#64748b;border:none;background:transparent;cursor:pointer;font-family:inherit;transition:all .15s}
.rtab.on{background:#fff;color:#2563eb;box-shadow:0 1px 6px rgba(0,0,0,.1)}
#aBtn{display:none;width:100%;padding:10px;margin-bottom:12px;background:#fff3f3;color:#dc2626;
      border:1.5px solid #fecaca;border-radius:8px;font-size:.8rem;font-weight:700;font-family:inherit;cursor:pointer}
.fg{margin-bottom:11px}
.fg label{font-size:.73rem;font-weight:700;color:#64748b;display:block;margin-bottom:4px}
.fg input{width:100%;height:46px;border:1.5px solid #e2e8f0;border-radius:9px;padding:0 13px;
          font-size:16px;font-family:inherit;outline:none;transition:border-color .15s}
.fg input:focus{border-color:#2563eb}
.bpri{width:100%;height:50px;background:#2563eb;color:#fff;border:none;border-radius:10px;
      font-size:.97rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.bpri:active{opacity:.85}

/* ───── 앱 ───── */
#APP{display:none;min-height:100vh}
.hdr{height:52px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;
     justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100;
     box-shadow:0 1px 6px rgba(0,0,0,.05)}
.hdr-logo{font-size:.95rem;font-weight:900;color:#2563eb}
.hdr-r{display:flex;align-items:center;gap:6px}
.badge{background:#f0f4ff;border-radius:16px;padding:3px 10px;font-size:.7rem;font-weight:700;color:#2563eb;
       max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blg{background:none;border:1.5px solid #e2e8f0;border-radius:7px;padding:4px 9px;
     font-size:.68rem;font-weight:700;color:#64748b;cursor:pointer;font-family:inherit}

/* ───── 하단 탭 (모바일) ───── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;
      display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);
      box-shadow:0 -2px 8px rgba(0,0,0,.05)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px 2px;font-size:.59rem;font-weight:700;color:#94a3b8;border:none;background:none;
    font-family:inherit;cursor:pointer;gap:2px;min-height:56px;transition:color .12s}
.ni .ic{font-size:1.2rem;line-height:1}
.ni.on{color:#2563eb}

/* ───── 사이드바 (데스크톱) ───── */
.abody{display:block}
.sidebar{display:none}

@media(min-width:768px){
  .bnav{display:none}
  .abody{display:flex;min-height:calc(100vh - 52px)}
  .sidebar{display:flex;flex-direction:column;width:190px;background:#fff;
            border-right:1px solid #e2e8f0;padding:14px 10px;gap:3px;
            position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
  .sidebar .ni{flex-direction:row;justify-content:flex-start;padding:10px 12px;
               border-radius:9px;font-size:.82rem;min-height:auto;gap:8px}
  .sidebar .ni.on,.sidebar .ni:hover{background:#f0f4ff}
  .mc{padding:20px;flex:1}
  .inp2{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
  .full{grid-column:1/-1}
  .slist{max-height:calc(100vh - 280px)!important}
  .itabs{display:none!important}
  .ipanel{display:block!important}
  .d2col{display:grid!important;grid-template-columns:1fr 1fr;gap:10px}
}

/* ───── 콘텐츠 ───── */
.mc{padding:14px 13px calc(56px + env(safe-area-inset-bottom,0) + 12px)}
.view{display:none}
.view.on{display:block;animation:up .2s ease}
.stitle{font-size:.98rem;font-weight:900;margin-bottom:12px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;
      box-shadow:0 2px 10px rgba(37,99,235,.07)}
.ctit{font-size:.7rem;font-weight:700;color:#64748b;margin-bottom:8px;letter-spacing:.3px;text-transform:uppercase}

/* ───── 통계 ───── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
@media(min-width:500px){.sg{grid-template-columns:repeat(4,1fr)}}
.sb{background:#fff;border-radius:12px;padding:13px 8px;text-align:center;box-shadow:0 2px 10px rgba(37,99,235,.07)}
.sb .sl{font-size:.65rem;font-weight:700;color:#64748b;margin-bottom:2px}
.sb .sv{font-size:1.3rem;font-weight:900;color:#2563eb}
.sb.g .sv{color:#16a34a} .sb.r .sv{color:#dc2626}

/* ───── 검색 ───── */
.si{width:100%;height:42px;border:1.5px solid #e2e8f0;border-radius:9px;padding:0 12px;
    font-size:16px;font-family:inherit;outline:none;margin-bottom:6px;transition:border-color .15s}
.si:focus{border-color:#2563eb}
.slist{max-height:200px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:9px;background:#fafbff;
       -webkit-overflow-scrolling:touch}
.sit{display:flex;align-items:center;padding:10px 11px;border-bottom:1px solid #f1f5f9;cursor:pointer;gap:9px}
.sit:last-child{border-bottom:none}
.sit:active,.sit:hover{background:#eff6ff}
.sit input[type=checkbox]{width:18px;height:18px;accent-color:#2563eb;flex-shrink:0}
.sit .sn{font-size:.85rem;font-weight:700}
.sit .si2{font-size:.67rem;color:#64748b}

/* ───── 항목 탭 ───── */
.itabs{display:flex;border-radius:9px;overflow:hidden;border:1.5px solid #e2e8f0;margin-bottom:8px}
.itab{flex:1;padding:10px;text-align:center;font-size:.83rem;font-weight:700;cursor:pointer;
      border:none;background:#f8fafc;color:#94a3b8;font-family:inherit;transition:all .13s}
.itab.ar{background:#16a34a;color:#fff}
.itab.ap{background:#dc2626;color:#fff}
.ipanel{display:none}
.ipanel.on{display:block}
.d2col{display:none}
.colh{font-size:.72rem;font-weight:800;padding:6px 10px;border-radius:7px;margin-bottom:6px;text-align:center}
.colh.cr{background:#f0fdf4;color:#16a34a}
.colh.cp{background:#fff1f2;color:#dc2626}

/* ───── 아코디언 ───── */
.ah{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;
    background:#f8fafc;border-radius:8px;cursor:pointer;margin-bottom:4px;
    border:1px solid #e2e8f0;user-select:none}
.ah span{font-size:.74rem;font-weight:700;color:#64748b}
.aar{font-size:.57rem;color:#94a3b8;transition:transform .15s}
.ah.op .aar{transform:rotate(180deg)}
.ab{display:none;margin-bottom:4px}
.ab.op{display:block}

/* ───── 항목 버튼 ───── */
.ib{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;
    border:1.5px solid #e2e8f0;border-radius:9px;margin-bottom:5px;cursor:pointer;
    background:#fff;font-family:inherit;font-size:.8rem;color:#1e293b;width:100%;
    text-align:left;min-height:44px;transition:border-color .1s,background .1s}
.ib:active{opacity:.75}
.ib:hover{border-color:#94a3b8;background:#f8fafc}
.ib.sr{border-color:#16a34a;background:#f0fdf4}
.ib.sp{border-color:#dc2626;background:#fff1f2}
.ib .sc{font-size:.8rem;font-weight:900;min-width:30px;text-align:right;flex-shrink:0}
.sc.pos{color:#16a34a} .sc.neg{color:#dc2626}
.lb{font-size:.56rem;background:#fef3c7;color:#92400e;border-radius:3px;padding:1px 4px;
    margin-left:3px;font-weight:700;vertical-align:middle}

/* ───── 요약 + 저장 ───── */
.sumbar{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:9px;padding:10px 13px;
        display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sumbar .st{font-size:.77rem;font-weight:700;color:#2563eb}
.sumbar .ss{font-size:1rem;font-weight:900}
.bsv{width:100%;height:50px;background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;
     border:none;border-radius:10px;font-size:.96rem;font-weight:700;cursor:pointer;
     font-family:inherit;box-shadow:0 3px 10px rgba(37,99,235,.25);transition:opacity .15s}
.bsv:active{opacity:.85}
.bsv:disabled{opacity:.45;cursor:not-allowed}

/* ───── 기록 ───── */
.tfil{display:flex;gap:5px;margin-bottom:8px}
.tb{padding:5px 13px;border-radius:16px;border:1.5px solid #e2e8f0;background:#fff;
    font-size:.71rem;font-weight:700;cursor:pointer;font-family:inherit;color:#64748b;transition:all .1s}
.tb.on{background:#2563eb;border-color:#2563eb;color:#fff}
.ri{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;
    border-radius:9px;margin-bottom:6px;background:#fafbff;border:1px solid #e2e8f0}
.ri .ln{font-size:.85rem;font-weight:700}
.ri .lm{font-size:.67rem;color:#64748b;margin-top:2px}
.ri .rr{text-align:right;flex-shrink:0;margin-left:8px}
.rsc{font-size:.9rem;font-weight:900}
.rsc.pos{color:#16a34a} .rsc.neg{color:#dc2626}
.bdel{font-size:.63rem;padding:3px 8px;border-radius:5px;border:1px solid #dc2626;
      color:#dc2626;background:none;cursor:pointer;font-family:inherit;margin-top:4px}
.bedit{font-size:.63rem;padding:3px 8px;border-radius:5px;border:1px solid #2563eb;
       color:#2563eb;background:none;cursor:pointer;font-family:inherit;margin-top:4px;margin-right:3px}

/* ───── 학생 점수 ───── */
.shero{background:linear-gradient(135deg,#1e40af,#0ea5e9);border-radius:16px;padding:26px 18px;
       text-align:center;color:#fff;margin-bottom:10px}
.shero .hn{font-size:.85rem;opacity:.8;margin-bottom:3px}
.shero .hs{font-size:2.8rem;font-weight:900}
.shero .hl{font-size:.71rem;opacity:.6;margin-top:1px}
.srow{display:flex;padding:9px 11px;border-bottom:1px solid #f1f5f9;font-size:.79rem;gap:5px;align-items:center}
.srow:last-child{border-bottom:none}
.srow .sd{color:#64748b;font-size:.69rem;flex-shrink:0;min-width:40px}
.srow .sr{flex:1}
.srow .ss2{font-weight:900;flex-shrink:0;min-width:34px;text-align:right}
.srow .ste{font-size:.65rem;color:#64748b;flex-shrink:0;min-width:46px;text-align:right}

/* ───── 랭킹 ───── */
.rk{display:flex;align-items:center;padding:9px 11px;border-bottom:1px solid #f1f5f9;gap:9px}
.rk:last-child{border-bottom:none}
.rn{width:22px;height:22px;border-radius:50%;background:#f0f4ff;font-size:.69rem;font-weight:900;
    display:flex;align-items:center;justify-content:center;color:#64748b;flex-shrink:0}
.rn.g{background:#fef3c7;color:#d97706}
.rn.s{background:#f1f5f9;color:#475569}
.rn.b{background:#fff7ed;color:#c2410c}
.rnm{flex:1;font-size:.83rem;font-weight:700}
.rsc2{font-size:.87rem;font-weight:900;color:#2563eb}

/* ───── 필터 셀렉트 ───── */
.fsel{padding:6px 9px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:.75rem;
      font-family:inherit;outline:none;background:#fff;cursor:pointer}

/* ───── 모달 ───── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;
       align-items:center;justify-content:center;padding:16px}
#modal.on{display:flex}
.mbox{background:#fff;border-radius:16px;padding:22px 20px;width:100%;max-width:330px;
      box-shadow:0 8px 40px rgba(0,0,0,.2);animation:up .2s ease}
.mbox h3{font-size:.93rem;font-weight:900;margin-bottom:13px}
.mbox select,.mbox input[type=number]{width:100%;height:42px;border:1.5px solid #e2e8f0;border-radius:8px;
  padding:0 10px;font-size:14px;font-family:inherit;outline:none;margin-bottom:9px}
.mbtns{display:flex;gap:7px}
.mbtns button{flex:1;height:42px;border:none;border-radius:8px;font-weight:700;font-size:.84rem;cursor:pointer;font-family:inherit}
.mok{background:#2563eb;color:#fff}
.mcan{background:#f0f4ff;color:#64748b}

/* ───── 교사 인증 ───── */
.tauth{display:flex;gap:6px;margin-bottom:8px}
.tauth input{flex:1;height:40px;border:1.5px solid #e2e8f0;border-radius:8px;padding:0 10px;
             font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.tauth input:focus{border-color:#2563eb}

/* ───── 유틸 ───── */
.empty{text-align:center;padding:24px 12px;color:#94a3b8;font-size:.79rem}
.empty .ei{font-size:1.9rem;display:block;margin-bottom:5px;opacity:.3}
.hidden{display:none!important}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;animation:sp .5s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom,0) + 8px);left:50%;
       transform:translateX(-50%) translateY(10px);background:#1e293b;color:#fff;
       padding:10px 18px;border-radius:22px;font-size:.79rem;font-weight:700;opacity:0;
       transition:all .2s;pointer-events:none;white-space:pre-line;text-align:center;
       max-width:85vw;z-index:999}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:16px}}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="LS">
  <div class="lbox">
    <div class="llogo" id="llogo" onclick="ltap()">
      <span class="ico">🏫</span>
      <h1 id="ltitle">드림포인트</h1>
      <p id="lsub">학생 상벌점 관리 시스템</p>
    </div>
    <div class="rtabs">
      <button class="rtab on" id="tabT" onclick="setRole('teacher')">👩‍🏫 교사</button>
      <button class="rtab" id="tabS" onclick="setRole('student')">🎒 학생</button>
    </div>
    <button id="aBtn" onclick="setRole('admin')">🔑 관리자 모드 진입</button>
    <div class="fg">
      <label id="lbl">아이디</label>
      <input type="text" id="lid" autocomplete="off" autocapitalize="none" placeholder="아이디 입력">
    </div>
    <div class="fg">
      <label>비밀번호</label>
      <input type="password" id="lpw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="bpri" onclick="doLogin()">로그인 →</button>
  </div>
</div>

<!-- 앱 -->
<div id="APP">
  <header class="hdr">
    <div class="hdr-logo">🏫 드림포인트</div>
    <div class="hdr-r">
      <div class="badge" id="ubadge"></div>
      <button class="blg" onclick="doLogout()">로그아웃</button>
    </div>
  </header>
  <div class="abody">
    <nav class="sidebar" id="snav"></nav>
    <main class="mc" id="mc">

      <!-- 입력 뷰 -->
      <div class="view on" id="vInput">
        <p class="stitle">✏️ 상벌점 입력</p>
        <div id="taArea">
          <div class="card">
            <div class="ctit">교사 인증</div>
            <div class="tauth">
              <input type="text" id="tId" placeholder="교사 ID" autocapitalize="none">
              <input type="password" id="tPw" placeholder="비밀번호">
            </div>
          </div>
        </div>
        <div class="inp2">
          <div>
            <div class="card">
              <div class="ctit">학생 선택</div>
              <input class="si" type="search" id="ssearch" placeholder="🔍 이름 또는 학번" oninput="filterS()">
              <div class="slist" id="slist"><div class="empty"><span class="ei">⏳</span>로딩 중…</div></div>
            </div>
          </div>
          <div>
            <div class="card">
              <div class="itabs">
                <button class="itab ar" id="tabR" onclick="switchTab('r')">✅ 상점</button>
                <button class="itab" id="tabP" onclick="switchTab('p')">❌ 벌점</button>
              </div>
              <div class="ipanel on" id="panR"></div>
              <div class="ipanel" id="panP"></div>
              <div class="d2col" id="d2col">
                <div><div class="colh cr">✅ 상점</div><div id="dR"></div></div>
                <div><div class="colh cp">❌ 벌점</div><div id="dP"></div></div>
              </div>
            </div>
          </div>
          <div class="full">
            <div class="sumbar">
              <div class="st" id="stxt">학생·항목을 선택하세요</div>
              <div class="ss" id="ssc" style="color:#94a3b8">0점</div>
            </div>
            <button class="bsv" id="bsv" onclick="saveRec()">💾 기록하기</button>
          </div>
        </div>
      </div>

      <!-- 기록 뷰 -->
      <div class="view" id="vHist">
        <p class="stitle">📋 내 입력 기록</p>
        <div class="tfil">
          <button class="tb on" onclick="fHist('all',this)">전체</button>
          <button class="tb" onclick="fHist('r',this)">상점</button>
          <button class="tb" onclick="fHist('p',this)">벌점</button>
        </div>
        <div id="hlist"><div class="empty"><span class="ei">📭</span>기록 없음</div></div>
      </div>

      <!-- 학생 점수 뷰 -->
      <div class="view" id="vScore">
        <p class="stitle">🏆 나의 드림포인트</p>
        <div id="scoreWrap">
          <div class="card">
            <div class="ctit">학번 & 비밀번호로 조회</div>
            <div class="fg"><label>학번</label><input type="text" id="ssid" inputmode="numeric" placeholder="학번 입력"></div>
            <div class="fg"><label>비밀번호</label><input type="password" id="sspw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')searchStu()"></div>
            <button class="bsv" onclick="searchStu()">조회하기</button>
          </div>
        </div>
      </div>

      <!-- 관리자 통계 -->
      <div class="view" id="vDash">
        <p class="stitle">📊 전체 현황</p>
        <div class="sg">
          <div class="sb"><div class="sl">기록수</div><div class="sv" id="stTotal">-</div></div>
          <div class="sb g"><div class="sl">상점합계</div><div class="sv" id="stR">-</div></div>
          <div class="sb r"><div class="sl">벌점합계</div><div class="sv" id="stP">-</div></div>
          <div class="sb"><div class="sl">참여학생</div><div class="sv" id="stS">-</div></div>
        </div>
        <div class="card">
          <div class="ctit">🏆 순위 조회</div>
          <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
            <select class="fsel" id="fMonth" onchange="renderRank()"><option value="">전체 기간</option></select>
            <select class="fsel" id="fGrade" onchange="onGradeChange()"><option value="">전 학년</option><option>1</option><option>2</option><option>3</option></select>
            <select class="fsel" id="fClass" onchange="renderRank()"><option value="">전 반</option></select>
          </div>
          <div id="rankList"><div class="empty"><span class="ei">⏳</span>로딩 중…</div></div>
        </div>
      </div>

      <!-- 관리자 기록 수정 -->
      <div class="view" id="vEdit">
        <p class="stitle">✏️ 상벌점 수정</p>
        <div class="tfil">
          <button class="tb on" onclick="fEdit('all',this)">전체</button>
          <button class="tb" onclick="fEdit('r',this)">상점</button>
          <button class="tb" onclick="fEdit('p',this)">벌점</button>
        </div>
        <input class="si" type="search" id="esearch" placeholder="🔍 학생 이름/학번 검색" oninput="renderEdit()" style="margin-bottom:8px">
        <div id="elist"><div class="empty"><span class="ei">⏳</span>로딩 중…</div></div>
      </div>

    </main>
  </div>
  <nav class="bnav" id="bnav"></nav>
</div>

<!-- 수정 모달 -->
<div id="modal">
  <div class="mbox">
    <h3>기록 수정</h3>
    <select id="mReason"></select>
    <input type="number" id="mScore" placeholder="점수 (양수=상점, 음수=벌점)">
    <div class="mbtns">
      <button class="mcan" onclick="closeModal()">취소</button>
      <button class="mok" onclick="submitEdit()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════
// 전역 상태
// ════════════════════════════════════════
var G = {
  role: 'teacher',
  user: null,
  students: [],
  picked: null,   // 선택된 항목 {value, score, type}
  pickedV: null,  // 선택된 항목 value (중복 방지용)
  curTab: 'r',
  histList: [],
  histF: 'all',
  editList: [],
  editF: 'all',
  editRow: null,
  adminData: null,
  isMobile: true
};

// ════════════════════════════════════════
// 초기화
// ════════════════════════════════════════
(function init() {
  // 테마
  var t = CONFIG.THEME, s = document.documentElement.style;
  s.setProperty('--p', t.primary); s.setProperty('--s', t.secondary);
  document.getElementById('ltitle').textContent = CONFIG.SYSTEM_NAME;
  document.getElementById('lsub').textContent = CONFIG.SYSTEM_SUBTITLE;

  // 브레이크포인트
  function checkBP() { G.isMobile = window.innerWidth < 768; }
  checkBP();
  window.addEventListener('resize', checkBP);

  // 학생 목록 프리페치 (localStorage 30분 캐시)
  prefetchStudents();
})();

// ════════════════════════════════════════
// JSONP API
// ════════════════════════════════════════
var cbIdx = 0;
function api(payload, cb) {
  var n = '_cb' + (++cbIdx);
  var timer = setTimeout(function() {
    if (window[n]) { delete window[n]; toast('❌ 응답 시간 초과'); }
  }, 15000);
  window[n] = function(data) {
    clearTimeout(timer);
    delete window[n];
    var el = document.getElementById(n);
    if (el) el.parentNode.removeChild(el);
    cb(data);
  };
  var s = document.createElement('script');
  s.id = n;
  s.src = CONFIG.API_URL + '?callback=' + n + '&payload=' + encodeURIComponent(JSON.stringify(payload));
  s.onerror = function() {
    clearTimeout(timer);
    delete window[n];
    if (s.parentNode) s.parentNode.removeChild(s);
    toast('❌ 서버 연결 실패');
  };
  document.head.appendChild(s);
}

// ════════════════════════════════════════
// 학생 목록 캐시
// ════════════════════════════════════════
var SKEY = 'dp_stu', STTL = 30 * 60 * 1000;

function prefetchStudents() {
  try {
    var raw = localStorage.getItem(SKEY);
    if (raw) {
      var obj = JSON.parse(raw);
      if (Date.now() - obj.ts < STTL) { G.students = obj.d; return; }
    }
  } catch(e) {}
  api({ action: 'getAllStudents' }, function(r) {
    if (r && r.students) {
      G.students = r.students;
      try { localStorage.setItem(SKEY, JSON.stringify({ ts: Date.now(), d: r.students })); } catch(e) {}
    }
  });
}

function loadStudents() {
  if (G.students.length > 0) { renderStudents(G.students); return; }
  api({ action: 'getAllStudents' }, function(r) {
    if (r && r.students) {
      G.students = r.students;
      try { localStorage.setItem(SKEY, JSON.stringify({ ts: Date.now(), d: r.students })); } catch(e) {}
      renderStudents(G.students);
    }
  });
}

// ════════════════════════════════════════
// 로그인
// ════════════════════════════════════════
var ltapCount = 0, ltapTimer = null;
function ltap() {
  ltapCount++;
  clearTimeout(ltapTimer);
  ltapTimer = setTimeout(function() { ltapCount = 0; }, 2000);
  if (ltapCount >= 5) {
    ltapCount = 0;
    document.getElementById('aBtn').style.display = 'block';
    toast('🔑 관리자 모드 활성화');
  }
}

function setRole(r) {
  G.role = r;
  document.getElementById('tabT').classList.toggle('on', r === 'teacher');
  document.getElementById('tabS').classList.toggle('on', r === 'student');
  document.getElementById('lbl').textContent = r === 'student' ? '학번' : '아이디';
}

function doLogin() {
  var id = document.getElementById('lid').value.trim();
  var pw = document.getElementById('lpw').value.trim();
  if (!id || !pw) { toast('아이디와 비밀번호를 입력하세요'); return; }

  if (G.role === 'admin') {
    if (id === CONFIG.ADMIN_ID && pw === CONFIG.ADMIN_PW) {
      onLoginSuccess({ role: 'admin', name: '관리자', id: id, pw: pw });
    } else {
      toast('❌ 관리자 인증 실패');
    }
    return;
  }

  if (G.role === 'teacher') {
    api({ action: 'authTeacher', teacherId: id, teacherPw: pw }, function(r) {
      if (r && r.success) {
        onLoginSuccess({ role: 'teacher', name: r.name || id, id: id, pw: pw });
      } else {
        toast('❌ ' + (r && r.error ? r.error : '교사 인증 실패'));
      }
    });
    return;
  }

  // 학생
  api({ action: 'getStudentScore', id: id, pw: pw }, function(r) {
    if (r && r.error) { toast('❌ ' + r.error); return; }
    if (r && r.name) {
      onLoginSuccess({ role: 'student', name: r.name, id: id, pw: pw, sd: r });
    } else {
      toast('❌ 로그인 실패');
    }
  });
}

function onLoginSuccess(u) {
  G.user = u;
  document.getElementById('LS').style.display = 'none';
  document.getElementById('APP').style.display = 'block';
  var prefix = { admin: '🔑 ', teacher: '👩‍🏫 ', student: '🎒 ' }[u.role] || '';
  document.getElementById('ubadge').textContent = prefix + u.name;

  buildNav();

  if (u.role !== 'student') {
    loadStudents();
    buildItems();
    applyLayout();
  }
  if (u.role === 'teacher') {
    document.getElementById('tId').value = u.id;
    document.getElementById('tPw').value = u.pw;
    document.getElementById('taArea').classList.remove('hidden');
  }
  if (u.role === 'admin') {
    document.getElementById('taArea').classList.add('hidden');
    loadDash();
    loadEditRecords();
  }
  if (u.role === 'student') {
    document.getElementById('taArea').classList.add('hidden');
    renderScore(u.sd);
  }
}

function doLogout() {
  G.user = null; G.students = []; G.picked = null; G.pickedV = null;
  G.histList = []; G.editList = []; G.adminData = null;
  document.getElementById('APP').style.display = 'none';
  document.getElementById('LS').style.display = 'flex';
  document.getElementById('lid').value = '';
  document.getElementById('lpw').value = '';
}

// ════════════════════════════════════════
// 네비게이션
// ════════════════════════════════════════
var NAVS = {
  admin:   [{ id:'vDash',  ic:'📊', lb:'통계'  },
            { id:'vEdit',  ic:'✏️', lb:'수정'  },
            { id:'vInput', ic:'➕', lb:'입력'  }],
  teacher: [{ id:'vInput', ic:'✏️', lb:'입력'  },
            { id:'vHist',  ic:'📋', lb:'기록'  }],
  student: [{ id:'vScore', ic:'🏆', lb:'내 점수'}]
};

function buildNav() {
  var items = NAVS[G.user.role] || [];
  var html = items.map(function(n) {
    return '<button class="ni" data-view="' + n.id + '" onclick="switchView(\'' + n.id + '\',this)">' +
           '<span class="ic">' + n.ic + '</span>' + n.lb + '</button>';
  }).join('');
  document.getElementById('bnav').innerHTML = html;
  document.getElementById('snav').innerHTML = html;

  // 첫 뷰 활성화
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('on'); });
  if (items.length) {
    var first = document.getElementById(items[0].id);
    if (first) first.classList.add('on');
    document.querySelectorAll('[data-view="' + items[0].id + '"]').forEach(function(b) { b.classList.add('on'); });
  }
}

function switchView(id, el) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('on'); });
  var view = document.getElementById(id);
  if (view) view.classList.add('on');
  document.querySelectorAll('.ni').forEach(function(b) {
    b.classList.toggle('on', b.getAttribute('data-view') === id);
  });
  if (id === 'vHist') loadHist();
  if (id === 'vDash') { if (!G.adminData) loadDash(); }
  if (id === 'vEdit') { if (!G.editList.length) loadEditRecords(); }
}

// ════════════════════════════════════════
// 레이아웃 (모바일/데스크톱)
// ════════════════════════════════════════
function applyLayout() {
  var d2 = document.getElementById('d2col');
  var itabs = document.querySelector('.itabs');
  var panR = document.getElementById('panR');
  var panP = document.getElementById('panP');
  if (!d2) return;
  if (!G.isMobile) {
    d2.style.display = 'grid';
    if (itabs) itabs.style.display = 'none';
    panR.style.display = 'none';
    panP.style.display = 'none';
    buildAcc('dR', CONFIG.REWARD_ITEMS, 'r');
    buildAcc('dP', CONFIG.PENALTY_ITEMS, 'p');
  } else {
    d2.style.display = 'none';
    if (itabs) itabs.style.display = '';
    panR.classList.toggle('on', G.curTab === 'r');
    panP.classList.toggle('on', G.curTab === 'p');
  }
}

// ════════════════════════════════════════
// 학생 목록 렌더
// ════════════════════════════════════════
function renderStudents(arr) {
  var el = document.getElementById('slist');
  if (!arr || !arr.length) {
    el.innerHTML = '<div class="empty"><span class="ei">👥</span>학생 없음</div>'; return;
  }
  el.innerHTML = arr.map(function(s) {
    return '<div class="sit" onclick="toggleS(this)">' +
      '<input type="checkbox" class="schk" value="' + s.id + '" data-name="' + s.name + '" onclick="event.stopPropagation()">' +
      '<div><div class="sn">' + s.name + '</div><div class="si2">' + s.id + '</div></div>' +
      '</div>';
  }).join('');
}

function filterS() {
  var v = document.getElementById('ssearch').value.toLowerCase();
  renderStudents(G.students.filter(function(s) { return s.id.includes(v) || s.name.includes(v); }));
}

function toggleS(el) {
  var c = el.querySelector('.schk');
  c.checked = !c.checked;
  updateSum();
}

// ════════════════════════════════════════
// 항목 버튼
// ════════════════════════════════════════
function switchTab(t) {
  G.curTab = t;
  document.getElementById('tabR').className = 'itab' + (t === 'r' ? ' ar' : '');
  document.getElementById('tabP').className = 'itab' + (t === 'p' ? ' ap' : '');
  document.getElementById('panR').classList.toggle('on', t === 'r');
  document.getElementById('panP').classList.toggle('on', t === 'p');
}

function buildItems() {
  buildAcc('panR', CONFIG.REWARD_ITEMS, 'r');
  buildAcc('panP', CONFIG.PENALTY_ITEMS, 'p');
}

function buildAcc(cid, items, type) {
  var el = document.getElementById(cid);
  if (!el) return;
  var gen = items.filter(function(i) { return !i.isHomeroom; });
  var hr  = items.filter(function(i) { return i.isHomeroom; });
  el.innerHTML = mkAcc('일반 항목', gen, type, true) + (hr.length ? mkAcc('담임 전용', hr, type, false) : '');
}

function mkAcc(title, items, type, open) {
  var btns = items.map(function(item) {
    var lb = item.limit ? '<span class="lb">월' + item.limit + '점</span>' : '';
    var v = item.value.replace(/'/g, "\\'");
    return '<button class="ib" onclick="pickItem(this,\'' + v + '\',' + item.score + ',\'' + type + '\')" data-v="' + v + '">' +
      '<span>' + item.label + lb + '</span>' +
      '<span class="sc ' + (item.score > 0 ? 'pos' : 'neg') + '">' + (item.score > 0 ? '+' : '') + item.score + '</span>' +
      '</button>';
  }).join('');
  return '<div class="ah' + (open ? ' op' : '') + '" onclick="togAcc(this)">' +
    '<span>' + title + ' (' + items.length + ')</span><span class="aar">▼</span></div>' +
    '<div class="ab' + (open ? ' op' : '') + '">' + btns + '</div>';
}

function togAcc(h) {
  h.classList.toggle('op');
  h.nextElementSibling.classList.toggle('op');
}

function pickItem(btn, v, sc, type) {
  document.querySelectorAll('.ib').forEach(function(b) { b.classList.remove('sr', 'sp'); });
  if (G.pickedV === v) {
    G.picked = null; G.pickedV = null; updateSum(); return;
  }
  G.pickedV = v;
  G.picked = { value: v, score: sc, type: type };
  document.querySelectorAll('.ib[data-v="' + v.replace(/'/g, "\\'") + '"]').forEach(function(b) {
    b.classList.add(type === 'r' ? 'sr' : 'sp');
  });
  updateSum();
}

function updateSum() {
  var cnt = document.querySelectorAll('.schk:checked').length;
  var sc = G.picked ? G.picked.score : 0;
  var se = document.getElementById('ssc'), te = document.getElementById('stxt');
  if (!cnt || !G.picked) {
    te.textContent = '학생·항목을 선택하세요';
    se.textContent = '0점'; se.style.color = '#94a3b8'; return;
  }
  te.textContent = cnt + '명 × ' + G.picked.value;
  se.textContent = (sc > 0 ? '+' : '') + sc + '점';
  se.style.color = sc > 0 ? '#16a34a' : '#dc2626';
}

// ════════════════════════════════════════
// 저장
// ════════════════════════════════════════
function saveRec() {
  var tId = document.getElementById('tId').value.trim();
  var tPw = document.getElementById('tPw').value.trim();
  var chks = document.querySelectorAll('.schk:checked');
  if (G.user.role !== 'admin' && (!tId || !tPw)) { toast('교사 ID/PW를 입력하세요'); return; }
  if (!chks.length) { toast('학생을 선택하세요'); return; }
  if (!G.picked) { toast('항목을 선택하세요'); return; }
  var btn = document.getElementById('bsv');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>처리 중…';
  api({
    action: 'saveBatchData',
    teacherId: tId || CONFIG.ADMIN_ID,
    teacherPw: tPw || CONFIG.ADMIN_PW,
    reason: G.picked.value,
    score: G.picked.score,
    students: Array.from(chks).map(function(c) { return { id: c.value, name: c.dataset.name }; })
  }, function(r) {
    btn.disabled = false; btn.textContent = '💾 기록하기';
    toast(r && r.message ? r.message : String(r));
    document.querySelectorAll('.schk:checked').forEach(function(c) { c.checked = false; });
    document.querySelectorAll('.ib').forEach(function(b) { b.classList.remove('sr','sp'); });
    G.picked = null; G.pickedV = null;
    document.getElementById('ssearch').value = '';
    renderStudents(G.students); updateSum();
  });
}

// ════════════════════════════════════════
// 교사 기록 조회
// ════════════════════════════════════════
function loadHist() {
  var tId = document.getElementById('tId').value.trim();
  var tPw = document.getElementById('tPw').value.trim();
  if (G.user.role === 'teacher' && (!tId || !tPw)) {
    document.getElementById('hlist').innerHTML = '<div class="empty"><span class="ei">🔑</span>교사 정보를 입력하세요</div>'; return;
  }
  document.getElementById('hlist').innerHTML = '<div class="empty"><span class="ei">⏳</span>불러오는 중…</div>';
  api({ action: 'getTeacherHistory', teacherId: tId || CONFIG.ADMIN_ID, teacherPw: tPw || CONFIG.ADMIN_PW }, function(r) {
    if (r && r.error) { toast('❌ ' + r.error); return; }
    G.histList = (r && r.history) ? r.history : [];
    renderHist();
  });
}

function fHist(f, el) {
  G.histF = f;
  document.querySelectorAll('#vHist .tb').forEach(function(b) { b.classList.remove('on'); });
  el.classList.add('on');
  renderHist();
}

function renderHist() {
  var el = document.getElementById('hlist');
  var list = G.histList;
  if (G.histF === 'r') list = list.filter(function(h) { return h.score > 0; });
  if (G.histF === 'p') list = list.filter(function(h) { return h.score < 0; });
  if (!list.length) { el.innerHTML = '<div class="empty"><span class="ei">📭</span>기록 없음</div>'; return; }
  el.innerHTML = list.map(function(h) {
    return '<div class="ri">' +
      '<div><div class="ln">' + h.studentName + ' <span style="color:#94a3b8;font-size:.66rem">(' + h.studentId + ')</span></div>' +
      '<div class="lm">' + h.date + ' · ' + h.reason + '</div></div>' +
      '<div class="rr"><div class="rsc ' + (h.score > 0 ? 'pos' : 'neg') + '">' + (h.score > 0 ? '+' : '') + h.score + '점</div>' +
      '<button class="bdel" onclick="delRec(' + h.rowIndex + ',\'' + h.studentName + '\')">취소</button></div>' +
      '</div>';
  }).join('');
}

function delRec(rowIndex, nm) {
  if (!confirm('[' + nm + '] 기록을 취소하시겠습니까?')) return;
  var tId = document.getElementById('tId').value.trim();
  var tPw = document.getElementById('tPw').value.trim();
  api({ action: 'deleteRecord', rowIndex: rowIndex, teacherId: tId || CONFIG.ADMIN_ID, teacherPw: tPw || CONFIG.ADMIN_PW }, function(r) {
    toast(r && r.message ? r.message : String(r));
    loadHist();
  });
}

// ════════════════════════════════════════
// 학생 점수
// ════════════════════════════════════════
function searchStu() {
  var sid = document.getElementById('ssid').value.trim();
  var spw = document.getElementById('sspw').value.trim();
  if (!sid || !spw) { toast('학번과 비밀번호를 입력하세요'); return; }
  api({ action: 'getStudentScore', id: sid, pw: spw }, function(r) {
    if (r && r.error) { toast('❌ ' + r.error); return; }
    renderScore(r);
  });
}

function renderScore(data) {
  if (!data) return;
  var h = data.history || [];
  var rows = h.length ? h.map(function(x) {
    return '<div class="srow">' +
      '<span class="sd">' + x.date + '</span>' +
      '<span class="sr">' + x.reason + '</span>' +
      '<span class="ss2 rsc ' + (parseFloat(x.score) >= 0 ? 'pos' : 'neg') + '">' + x.score + '</span>' +
      '<span class="ste">' + (x.teacherName || '') + '</span>' +
      '</div>';
  }).join('') : '<div class="empty"><span class="ei">📭</span>기록 없음</div>';
  document.getElementById('scoreWrap').innerHTML =
    '<div class="shero"><div class="hn">' + data.name + ' 학생</div>' +
    '<div class="hs">' + data.total + '점</div><div class="hl">누적 드림포인트</div></div>' +
    '<div class="card"><div class="ctit">상세 내역</div>' + rows + '</div>';
}

// ════════════════════════════════════════
// 관리자 통계
// ════════════════════════════════════════
function loadDash() {
  api({ action: 'getAdminStats', adminId: CONFIG.ADMIN_ID, adminPw: CONFIG.ADMIN_PW }, function(r) {
    if (r && r.error) { toast('❌ ' + r.error); return; }
    G.adminData = r;
    document.getElementById('stTotal').textContent = r.totalCount || 0;
    document.getElementById('stR').textContent = r.totalReward || 0;
    document.getElementById('stP').textContent = Math.abs(r.totalPenalty || 0);
    document.getElementById('stS').textContent = r.studentCount || 0;
    var ms = document.getElementById('fMonth');
    if (ms.options.length <= 1) {
      Object.keys(r.monthlyRanks || {}).sort().reverse().forEach(function(ym) {
        var o = document.createElement('option'); o.value = ym; o.textContent = ym; ms.appendChild(o);
      });
    }
    renderRank();
  });
}

function onGradeChange() {
  var g = document.getElementById('fGrade').value;
  var fc = document.getElementById('fClass');
  fc.innerHTML = '<option value="">전 반</option>';
  if (g && G.adminData) {
    var clsSet = {};
    (G.adminData.topStudents || []).forEach(function(s) {
      if (String(s.grade) === g) clsSet[String(s.cls)] = 1;
    });
    Object.keys(clsSet).sort().forEach(function(c) {
      var o = document.createElement('option'); o.value = c; o.textContent = c + '반'; fc.appendChild(o);
    });
  }
  renderRank();
}

function renderRank() {
  if (!G.adminData) return;
  var mon   = document.getElementById('fMonth').value;
  var grade = document.getElementById('fGrade').value;
  var cls   = document.getElementById('fClass').value;
  var list = mon ? (G.adminData.monthlyRanks[mon] || []) : (G.adminData.topStudents || []);
  if (grade) list = list.filter(function(s) { return String(s.grade) === grade; });
  if (cls)   list = list.filter(function(s) { return String(s.cls) === cls; });
  var el = document.getElementById('rankList');
  if (!list.length) { el.innerHTML = '<div class="empty"><span class="ei">📊</span>데이터 없음</div>'; return; }
  el.innerHTML = list.slice(0, 20).map(function(s, i) {
    return '<div class="rk"><div class="rn ' + (i===0?'g':i===1?'s':i===2?'b':'') + '">' + (i+1) + '</div>' +
      '<div class="rnm">' + s.name + ' <span style="color:#94a3b8;font-size:.66rem">(' + s.id + ')</span></div>' +
      '<div class="rsc2">' + s.total + '점</div></div>';
  }).join('');
}

// ════════════════════════════════════════
// 관리자 기록 수정
// ════════════════════════════════════════
function loadEditRecords() {
  document.getElementById('elist').innerHTML = '<div class="empty"><span class="ei">⏳</span>불러오는 중…</div>';
  api({ action: 'getAdminRecords', adminId: CONFIG.ADMIN_ID, adminPw: CONFIG.ADMIN_PW }, function(r) {
    if (r && r.error) { toast('❌ ' + r.error); return; }
    G.editList = (r && r.records) ? r.records : [];
    renderEdit();
  });
}

function fEdit(f, el) {
  G.editF = f;
  document.querySelectorAll('#vEdit .tb').forEach(function(b) { b.classList.remove('on'); });
  el.classList.add('on');
  renderEdit();
}

function renderEdit() {
  var el = document.getElementById('elist');
  var q = document.getElementById('esearch').value.toLowerCase();
  var list = G.editList;
  if (G.editF === 'r') list = list.filter(function(h) { return h.score > 0; });
  if (G.editF === 'p') list = list.filter(function(h) { return h.score < 0; });
  if (q) list = list.filter(function(h) { return h.studentName.includes(q) || h.studentId.includes(q); });
  if (!list.length) { el.innerHTML = '<div class="empty"><span class="ei">📭</span>기록 없음</div>'; return; }
  el.innerHTML = list.slice(0, 100).map(function(h) {
    var reason = h.reason.replace(/'/g, "\\'");
    return '<div class="ri">' +
      '<div><div class="ln">' + h.studentName + ' <span style="color:#94a3b8;font-size:.66rem">(' + h.studentId + ')</span></div>' +
      '<div class="lm">' + h.date + ' · ' + h.reason + ' · ' + h.teacherId + '</div></div>' +
      '<div class="rr"><div class="rsc ' + (h.score > 0 ? 'pos' : 'neg') + '">' + (h.score > 0 ? '+' : '') + h.score + '점</div>' +
      '<button class="bedit" onclick="openModal(' + h.rowIndex + ',\'' + reason + '\',' + h.score + ')">수정</button>' +
      '<button class="bdel" onclick="adminDel(' + h.rowIndex + ')">삭제</button></div>' +
      '</div>';
  }).join('');
}

function adminDel(rowIndex) {
  if (!confirm('이 기록을 삭제하시겠습니까?')) return;
  api({ action: 'deleteRecord', rowIndex: rowIndex, teacherId: CONFIG.ADMIN_ID, teacherPw: CONFIG.ADMIN_PW }, function(r) {
    toast(r && r.message ? r.message : String(r));
    G.editList = G.editList.filter(function(x) { return x.rowIndex !== rowIndex; });
    G.adminData = null;
    renderEdit();
  });
}

function openModal(rowIndex, reason, score) {
  G.editRow = rowIndex;
  var sel = document.getElementById('mReason');
  sel.innerHTML = CONFIG.REWARD_ITEMS.concat(CONFIG.PENALTY_ITEMS).map(function(i) {
    return '<option value="' + i.value + '"' + (i.value === reason ? ' selected' : '') + '>' + i.label + '</option>';
  }).join('');
  document.getElementById('mScore').value = score;
  document.getElementById('modal').classList.add('on');
}

function closeModal() {
  document.getElementById('modal').classList.remove('on');
  G.editRow = null;
}

function submitEdit() {
  if (!G.editRow) return;
  var reason = document.getElementById('mReason').value;
  var score = parseFloat(document.getElementById('mScore').value);
  if (isNaN(score)) { toast('점수를 입력하세요'); return; }
  api({ action: 'editRecord', rowIndex: G.editRow, reason: reason, score: score }, function(r) {
    toast(r && r.message ? r.message : String(r));
    closeModal();
    G.editList = []; G.adminData = null;
    loadEditRecords();
  });
}

// ════════════════════════════════════════
// 토스트
// ════════════════════════════════════════
var toastTimer = null;
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('on'); }, 3000);
}
</script>
</body>
</html>
